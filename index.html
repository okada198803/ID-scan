<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名刺スキャナー</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;--surface:#fff;--surface2:#f0ede8;
  --border:#e2ddd6;--border2:#ccc7be;
  --text:#1a1815;--text2:#6b6560;--text3:#a09b94;
  --accent:#2d5a3d;--accent-bg:#e8f0eb;--accent-border:#b5d0bb;--accent-text:#1d3d29;
  --danger:#8b2020;--danger-bg:#fdf0f0;
  --warn:#7a5a00;--warn-bg:#fdf8e8;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-shell{display:flex;flex-direction:column;min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.topbar-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.8}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:12px;color:var(--text3);margin-left:4px}
.topbar-badge{margin-left:auto;font-size:11px;background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border);border-radius:99px;padding:3px 10px;font-weight:500}

.main{display:flex;flex:1}
.panel-left{width:380px;flex-shrink:0;padding:20px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
.panel-right{flex:1;padding:20px;overflow-y:auto;background:var(--bg)}

button{font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:background .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;font-weight:400;white-space:nowrap}
button:hover{background:var(--surface2)}
button:active{transform:scale(.97)}
button svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.btn-primary:hover{background:#245032;border-color:#245032}
.btn-danger{color:var(--danger);border-color:#e8c0c0}
.btn-danger:hover{background:var(--danger-bg)}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}

.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-bg)}
.dz-icon{width:44px;height:44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.dz-icon svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:1.5}
.dz-title{font-size:14px;font-weight:500;margin-bottom:4px}
.dz-sub{font-size:12px;color:var(--text3);line-height:1.6}

.sec-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

.camera-wrap{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#000}
video{width:100%;display:block;max-height:260px;object-fit:cover}
canvas{display:none}
.cam-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
/* cam-frame サイズは JS で直接設定 */
.cam-frame{border:2px solid rgba(255,255,255,.85);border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);transition:width .25s,height .25s}

/* 向き選択トグル */
.orient-toggle{display:flex;gap:6px;margin-bottom:10px}
.orient-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;transition:border-color .15s,background .15s;font-size:12px;color:var(--text2)}
.orient-btn.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.orient-btn svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.5}
.orient-btn span{font-size:11px}

/* カメラ解像度バッジ */
.res-badge{font-size:10px;font-family:'DM Mono',monospace;background:rgba(0,0,0,.55);color:#fff;padding:3px 8px;border-radius:99px;position:absolute;bottom:8px;right:8px;pointer-events:none;z-index:2}

.cropper-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.crop-img-wrap{max-height:280px;overflow:hidden;border-radius:var(--radius-sm);background:#111}
.crop-img-wrap img{display:block;max-width:100%}
.crop-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

.progress-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.progress-bar-bg{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:10px}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s ease;width:0%}
.progress-label{font-size:12px;color:var(--text2);display:flex;justify-content:space-between}

.classify-grid{display:flex;flex-direction:column;gap:8px}
.classify-row{display:flex;align-items:flex-start;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
.classify-row.matched{border-color:var(--accent-border);background:var(--accent-bg)}
.field-type-label{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;min-width:78px;padding-top:4px}
.field-type-label span{display:inline-block;margin-right:3px;font-size:13px}
.classify-input{flex:1;font-family:'Noto Sans JP',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 9px;background:var(--surface);color:var(--text);resize:vertical;min-height:34px}
.classify-input:focus{outline:none;border-color:var(--accent)}
.classify-input.multi{min-height:52px}
.conf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.conf-high{background:#2d5a3d}
.conf-low{background:#ccc}

.ocr-raw-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.ocr-raw-box textarea{width:100%;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:transparent;border:none;resize:vertical;min-height:80px;line-height:1.7}
.ocr-raw-box textarea:focus{outline:none}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-head{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-bg);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:1px solid var(--accent-border)}
.card-name{font-size:15px;font-weight:700;line-height:1.3}
.card-pos{font-size:12px;color:var(--text2);margin-top:2px}
.company-pill{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:13px}
.field:last-child{border-bottom:none}
.field-ic{width:26px;height:26px;flex-shrink:0;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-top:1px}
.field-ic svg{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:1.8}
.f-label{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:500;letter-spacing:.3px}
.f-val{color:var(--text);line-height:1.5;word-break:break-all}
.f-val.mono{font-family:'DM Mono',monospace;font-size:12px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface2);border-top:1px solid var(--border)}
.card-ts{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.list-title{font-size:15px;font-weight:700}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;font-family:'Noto Sans JP',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:1.8;pointer-events:none}

.notice{font-size:12px;background:var(--warn-bg);border:1px solid #e8d888;border-radius:var(--radius-sm);padding:10px 12px;color:var(--warn);line-height:1.6}
.notice strong{font-weight:700}
.error-msg{font-size:12px;background:var(--danger-bg);border:1px solid #e8c0c0;border-radius:var(--radius-sm);padding:10px 12px;color:var(--danger);line-height:1.6}
.divider{height:1px;background:var(--border)}
.export-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.7}

@media(max-width:700px){
  .main{flex-direction:column}
  .panel-left{width:100%;border-right:none;border-bottom:1px solid var(--border);position:static;max-height:none}
  .topbar-sub{display:none}
}
</style>
</head>
<body>
<div class="app-shell">

<header class="topbar">
  <div class="topbar-logo"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M6 10h5M6 14h8"/></svg></div>
  <span class="topbar-title">名刺スキャナー</span>
  <span class="topbar-sub">— 無料・ブラウザのみ</span>
  <span class="topbar-badge">完全無料 / APIキー不要</span>
</header>

<div class="main">
<aside class="panel-left">

  <!-- STEP 1 -->
  <div id="step-input">
    <div class="sec-label">① 名刺を読み込む</div>
    <div class="drop-zone" id="drop-zone">
      <div class="dz-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <p class="dz-title">ドラッグ＆ドロップ</p>
      <p class="dz-sub">JPG / PNG / WebP 対応</p>
      <div class="btn-group">
        <button onclick="document.getElementById('file-input').click()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>ファイル選択</button>
        <button onclick="startCamera()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>カメラ</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    <div id="cam-wrap" style="display:none">
      <!-- 向き選択 -->
      <div class="orient-toggle" id="cam-orient-toggle">
        <div class="orient-btn active" id="ob-land" onclick="setOrientation('landscape')">
          <svg viewBox="0 0 36 24"><rect x="1" y="1" width="34" height="22" rx="2"/><line x1="6" y1="7" x2="20" y2="7"/><line x1="6" y1="12" x2="26" y2="12"/><line x1="6" y1="17" x2="16" y2="17"/></svg>
          <span>横向き</span>
        </div>
        <div class="orient-btn" id="ob-port" onclick="setOrientation('portrait')">
          <svg viewBox="0 0 24 36"><rect x="1" y="1" width="22" height="34" rx="2"/><line x1="5" y1="8" x2="15" y2="8"/><line x1="5" y1="13" x2="19" y2="13"/><line x1="5" y1="18" x2="12" y2="18"/></svg>
          <span>縦向き</span>
        </div>
      </div>
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-guide"><div class="cam-frame" id="cam-frame"></div></div>
        <div class="res-badge" id="res-badge">— × —</div>
        <canvas id="canvas"></canvas>
      </div>
      <div class="btn-group" style="margin-top:8px">
        <button class="btn-primary" onclick="capturePhoto()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/></svg>撮影</button>
        <button onclick="stopCamera()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- STEP 2: トリミング -->
  <div id="step-crop" style="display:none">
    <div class="sec-label">② トリミング（範囲を選択）</div>
    <!-- 向き切り替え（トリミング画面でも変更可） -->
    <div class="orient-toggle" style="margin-bottom:10px">
      <div class="orient-btn active" id="cb-land" onclick="setCropOrientation('landscape')">
        <svg viewBox="0 0 36 24"><rect x="1" y="1" width="34" height="22" rx="2"/><line x1="6" y1="7" x2="20" y2="7"/><line x1="6" y1="12" x2="26" y2="12"/><line x1="6" y1="17" x2="16" y2="17"/></svg>
        <span>横向き</span>
      </div>
      <div class="orient-btn" id="cb-port" onclick="setCropOrientation('portrait')">
        <svg viewBox="0 0 24 36"><rect x="1" y="1" width="22" height="34" rx="2"/><line x1="5" y1="8" x2="15" y2="8"/><line x1="5" y1="13" x2="19" y2="13"/><line x1="5" y1="18" x2="12" y2="18"/></svg>
        <span>縦向き</span>
      </div>
    </div>
    <div class="cropper-section">
      <div class="crop-img-wrap"><img id="crop-img" alt="crop"></div>
      <div class="crop-toolbar">
        <button class="btn-sm" onclick="cropper.rotate(-90)"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/></svg>左回転</button>
        <button class="btn-sm" onclick="cropper.rotate(90)"><svg viewBox="0 0 24 24" style="transform:scaleX(-1)"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/></svg>右回転</button>
        <button class="btn-sm" onclick="cropper.reset()">リセット</button>
        <button class="btn-sm" onclick="cropper.setAspectRatio(NaN)">フリー</button>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" onclick="applyCrop()"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>トリミングしてOCRへ</button>
      <button onclick="clearAll()">やり直す</button>
    </div>
  </div>

  <!-- STEP 3: OCR -->
  <div id="step-progress" style="display:none">
    <div class="sec-label">③ テキスト認識中...</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
      <div class="progress-label"><span id="prog-status">初期化中...</span><span id="prog-pct">0%</span></div>
    </div>
  </div>

  <!-- STEP 4: 分類エディタ -->
  <div id="step-classify" style="display:none">
    <div class="sec-label">④ 分類結果を確認・修正</div>
    <div class="classify-grid" id="classify-grid"></div>
    <details style="margin-top:8px">
      <summary style="font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0;user-select:none">▸ OCR 生テキストを確認・再分類</summary>
      <div class="ocr-raw-box" style="margin-top:6px">
        <textarea id="ocr-raw" rows="6"></textarea>
        <button class="btn-sm" style="margin-top:6px" onclick="reclassify()"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/></svg>再分類</button>
      </div>
    </details>
    <div class="btn-group" style="margin-top:8px">
      <button class="btn-primary" onclick="saveCard()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>保存する</button>
      <button onclick="clearAll()">やり直す</button>
    </div>
    <div class="notice" style="margin-top:8px"><strong>ヒント：</strong>各フィールドを直接編集できます。複数値は改行で区切ってください。</div>
  </div>

  <div id="step-error" style="display:none"></div>
  <div class="divider"></div>
  <div class="notice"><strong>🔒 プライバシー：</strong>すべてブラウザ内処理。外部送信なし。</div>
</aside>

<main class="panel-right">
  <div class="list-header">
    <span class="list-title">登録済み名刺</span>
    <span style="font-size:12px;color:var(--text3)" id="card-meta">0件</span>
  </div>
  <div id="export-area" style="display:none">
    <div class="export-panel">
      <div class="sec-label" style="margin-bottom:10px">出力・エクスポート</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="exportExcel()" style="background:#1d6f42;color:#fff;border-color:#1a6038;font-weight:500"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Excel (.xlsx)</button>
        <button onclick="exportCSV()" style="background:#1a4e7a;color:#fff;border-color:#174469;font-weight:500"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV (.csv)</button>
        <button onclick="printCards()"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>印刷</button>
        <button class="btn-danger" onclick="clearAllCards()" style="margin-left:auto"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>全件削除</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">Excelはフィルター・列幅調整・概要シート付きで出力</div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="名前・会社・メールで検索..." oninput="renderCards()">
    </div>
  </div>
  <div id="cards-list"></div>
</main>
</div>
</div>

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let cards = JSON.parse(localStorage.getItem('meishi_v2') || '[]');
let currentImageData = null;
let stream = null;
let cropper = null;
let cardOrientation = 'landscape'; // 'landscape' | 'portrait'

// 名刺の標準アスペクト比 (ISO 7810 ID-1: 85.6mm × 54mm)
const ASPECT_LAND = 85.6 / 54;   // ≈ 1.585  横向き
const ASPECT_PORT = 54 / 85.6;   // ≈ 0.631  縦向き

// カメラ内ガイド枠の幅：ビュー幅に対する比率
const GUIDE_RATIO = 0.86;

const $ = id => document.getElementById(id);
const show = id => $(id).style.display = 'block';
const hide = id => $(id).style.display = 'none';

// ══════════════════════════════════════════════════
// ORIENTATION
// ══════════════════════════════════════════════════
function setOrientation(orient) {
  cardOrientation = orient;
  // カメラ画面のトグルボタン
  $('ob-land').classList.toggle('active', orient === 'landscape');
  $('ob-port').classList.toggle('active', orient === 'portrait');
  // トリミング画面のトグルボタンも同期
  if ($('cb-land')) {
    $('cb-land').classList.toggle('active', orient === 'landscape');
    $('cb-port').classList.toggle('active', orient === 'portrait');
  }
  updateGuideFrame();
}

function setCropOrientation(orient) {
  setOrientation(orient);
  // トリマーのアスペクト比を即時変更
  if (cropper) {
    cropper.setAspectRatio(orient === 'landscape' ? ASPECT_LAND : ASPECT_PORT);
  }
}

function updateGuideFrame() {
  const frame = $('cam-frame');
  if (!frame) return;
  const vw = $('video').clientWidth || 340;
  const guideW = vw * GUIDE_RATIO;
  const guideH = cardOrientation === 'landscape'
    ? guideW / ASPECT_LAND
    : guideW * ASPECT_PORT / ASPECT_PORT * (1 / ASPECT_PORT) * ASPECT_PORT; // = guideW / ASPECT_PORT... simplify:

  // 縦向きはガイド幅を小さく調整して縦長に
  const fw = cardOrientation === 'landscape' ? guideW : guideW * 0.55;
  const fh = cardOrientation === 'landscape' ? fw / ASPECT_LAND : fw / ASPECT_PORT;

  frame.style.width  = Math.round(fw) + 'px';
  frame.style.height = Math.round(fh) + 'px';
}

// ══════════════════════════════════════════════════
// FILE / DROP
// ══════════════════════════════════════════════════
const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
$('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) loadFile(f); e.target.value = '';
});
function loadFile(file) {
  const r = new FileReader();
  r.onload = ev => initCropper(ev.target.result);
  r.readAsDataURL(file);
}

// ══════════════════════════════════════════════════
// CAMERA  — 高精細モード
// ══════════════════════════════════════════════════
async function startCamera() {
  try {
    // できる限り高解像度を要求（デバイスの最大に近い値を指定）
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 4096, min: 1280 },
        height: { ideal: 2160, min: 720 },
        // 手ブレ防止・高品質
        advanced: [{ zoom: 1 }]
      }
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const v = $('video');
    v.srcObject = stream;

    // 解像度バッジ更新
    v.onloadedmetadata = () => {
      const track = stream.getVideoTracks()[0];
      const settings = track.getSettings();
      const w = settings.width  || v.videoWidth;
      const h = settings.height || v.videoHeight;
      $('res-badge').textContent = `${w} × ${h}`;
      updateGuideFrame();
    };

    // ビデオサイズ変化時にもガイド更新
    const ro = new ResizeObserver(() => updateGuideFrame());
    ro.observe(v);

    hide('drop-zone'); show('cam-wrap');
    updateGuideFrame();
  } catch(e) {
    showError('カメラへのアクセスが許可されていません。ファイル選択をご利用ください。');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  hide('cam-wrap'); show('drop-zone');
}

function capturePhoto() {
  const v = $('video');

  // ── 実際の映像解像度でキャプチャ ──
  const vw = v.videoWidth;
  const vh = v.videoHeight;
  const c = $('canvas');
  c.width  = vw;
  c.height = vh;
  const ctx = c.getContext('2d');
  ctx.drawImage(v, 0, 0, vw, vh);

  // ── ガイド枠に対応する映像座標を計算してプリクロップ ──
  // ガイド枠はビデオ表示領域に対して GUIDE_RATIO の幅
  const displayW = v.clientWidth;
  const displayH = v.clientHeight;
  const scaleX = vw / displayW;
  const scaleY = vh / displayH;

  const aspect = cardOrientation === 'landscape' ? ASPECT_LAND : ASPECT_PORT;
  const frameDisplayW = cardOrientation === 'landscape'
    ? displayW * GUIDE_RATIO
    : displayW * GUIDE_RATIO * 0.55;
  const frameDisplayH = frameDisplayW / aspect;

  // ガイド枠の中心は画面中央
  const fx = (displayW - frameDisplayW) / 2;
  const fy = (displayH - frameDisplayH) / 2;

  // 映像ピクセル座標に変換（object-fit:cover のオフセットも考慮）
  // video がカバーモードの場合、実際の映像表示は aspect fit でなく cover
  const videoAspect = vw / vh;
  const displayAspect = displayW / displayH;
  let offsetX = 0, offsetY = 0, renderW = vw, renderH = vh;
  if (videoAspect > displayAspect) {
    // 映像が横に広い → 左右がはみ出す
    renderH = vh;
    renderW = vh * displayAspect;
    offsetX = (vw - renderW) / 2;
  } else {
    // 映像が縦に高い → 上下がはみ出す
    renderW = vw;
    renderH = vw / displayAspect;
    offsetY = (vh - renderH) / 2;
  }

  const cropX = Math.round(offsetX + fx * (renderW / displayW));
  const cropY = Math.round(offsetY + fy * (renderH / displayH));
  const cropW = Math.round(frameDisplayW * (renderW / displayW));
  const cropH = Math.round(frameDisplayH * (renderH / displayH));

  // プリクロップキャンバス（ガイド枠内だけ切り出し）
  const preCrop = document.createElement('canvas');
  preCrop.width  = cropW;
  preCrop.height = cropH;
  preCrop.getContext('2d').drawImage(c, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

  stopCamera();
  initCropper(preCrop.toDataURL('image/jpeg', 1.0));
}

// ══════════════════════════════════════════════════
// CROPPER — ガイド枠と同じアスペクト比で初期化
// ══════════════════════════════════════════════════
function initCropper(dataUrl) {
  hide('step-input');
  show('step-crop');

  // トリミング画面のトグルを現在の向きに同期
  if ($('cb-land')) {
    $('cb-land').classList.toggle('active', cardOrientation === 'landscape');
    $('cb-port').classList.toggle('active', cardOrientation === 'portrait');
  }

  const img = $('crop-img');
  img.src = '';
  img.onload = () => {
    if (cropper) { cropper.destroy(); cropper = null; }
    const aspect = cardOrientation === 'landscape' ? ASPECT_LAND : ASPECT_PORT;
    cropper = new Cropper(img, {
      viewMode: 1,
      dragMode: 'move',
      aspectRatio: aspect,          // カメラガイド枠と同じ比率
      autoCropArea: 0.98,           // プリクロップ済みなので広めに
      movable: true,
      zoomable: true,
      rotatable: true,
      scalable: false,
      background: true,
      guides: true,
      center: true,
    });
  };
  img.src = dataUrl;
}

function applyCrop() {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas({
    maxWidth: 3000, maxHeight: 3000,
    imageSmoothingEnabled: true, imageSmoothingQuality: 'high',
    fillColor: '#fff',
  });
  currentImageData = canvas.toDataURL('image/png'); // PNG の方が前処理に適している
  cropper.destroy(); cropper = null;
  hide('step-crop');
  startOCR();
}

// ══════════════════════════════════════════════════
// 画像前処理エンジン（③ OCR精度向上）
// ══════════════════════════════════════════════════

/**
 * OCR前処理パイプライン
 * 1. アップスケール（短辺 2400px 未満なら 2x）
 * 2. グレースケール変換
 * 3. コントラスト正規化（ヒストグラム伸長）
 * 4. アンシャープマスク（エッジ強調）
 * 5. 適応的閾値処理（Sauvola近似）→ 背景色・照明ムラに強い二値化
 * 6. 縦書き時：画像を90°回転して横書きOCRで読む
 */
async function preprocessImage(dataUrl, isPortrait) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let sw = img.width, sh = img.height;

      // Step 1: アップスケール（OCR推奨 300dpi 相当を確保）
      const minSide = Math.min(sw, sh);
      const scale = minSide < 2400 ? Math.min(2400 / minSide, 2.5) : 1.0;
      const w = Math.round(sw * scale);
      const h = Math.round(sh * scale);

      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);

      // Step 2 & 3: グレースケール + ヒストグラム伸長（コントラスト正規化）
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      const gray = new Uint8Array(w * h);

      // グレースケール化（輝度ベース）
      for (let i = 0; i < w * h; i++) {
        gray[i] = Math.round(
          0.2126 * d[i*4] + 0.7152 * d[i*4+1] + 0.0722 * d[i*4+2]
        );
      }

      // ヒストグラム伸長：1%〜99% パーセンタイルを 0〜255 にマッピング
      const hist = new Int32Array(256);
      for (let i = 0; i < gray.length; i++) hist[gray[i]]++;
      const total = gray.length;
      let lo = 0, hi = 255, cumLo = 0, cumHi = 0;
      for (let v = 0; v < 256; v++) {
        cumLo += hist[v];
        if (cumLo / total < 0.01) lo = v;
      }
      for (let v = 255; v >= 0; v--) {
        cumHi += hist[v];
        if (cumHi / total < 0.01) hi = v;
      }
      const range = hi - lo || 1;
      for (let i = 0; i < gray.length; i++) {
        gray[i] = Math.min(255, Math.max(0, Math.round((gray[i] - lo) / range * 255)));
      }

      // Step 4: アンシャープマスク（ガウスぼかし差分でエッジ強調）
      const blurred = gaussianBlur(gray, w, h, 1.2);
      const strength = 1.4; // 強調係数
      for (let i = 0; i < gray.length; i++) {
        gray[i] = clamp(Math.round(gray[i] + strength * (gray[i] - blurred[i])));
      }

      // Step 5: Sauvola 近似による適応的二値化
      //   各ピクセルを周辺ウィンドウ（radius=16px）の統計で閾値化
      //   → 照明ムラ・グラデーション背景名刺に強い
      const R = 16;      // ウィンドウ半径
      const k = 0.18;    // Sauvola パラメータ
      const binarized = sauvolaBinarize(gray, w, h, R, k);

      // 結果をRGBAに書き戻す
      for (let i = 0; i < w * h; i++) {
        const v = binarized[i];
        d[i*4] = d[i*4+1] = d[i*4+2] = v;
        d[i*4+3] = 255;
      }
      ctx.putImageData(imgData, 0, 0);

      // Step 6: 縦書き時は90°回転して横書きOCRで読む
      if (isPortrait) {
        const rc = document.createElement('canvas');
        rc.width = h; rc.height = w; // 幅と高さを入れ替え
        const rctx = rc.getContext('2d');
        rctx.translate(h / 2, w / 2);
        rctx.rotate(Math.PI / 2); // 反時計回り90° → 縦書きを横書きへ
        rctx.drawImage(c, -w / 2, -h / 2);
        resolve(rc.toDataURL('image/png'));
      } else {
        resolve(c.toDataURL('image/png'));
      }
    };
    img.src = dataUrl;
  });
}

/** ガウスぼかし（1次元カーネル分離） */
function gaussianBlur(src, w, h, sigma) {
  const kernel = buildGaussKernel(sigma);
  const tmp = new Float32Array(w * h);
  const out = new Uint8Array(w * h);
  const r = Math.floor(kernel.length / 2);

  // 横方向
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let sum = 0, wsum = 0;
      for (let k = -r; k <= r; k++) {
        const xx = clamp(x + k, 0, w - 1);
        sum  += src[y * w + xx] * kernel[k + r];
        wsum += kernel[k + r];
      }
      tmp[y * w + x] = sum / wsum;
    }
  }
  // 縦方向
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let sum = 0, wsum = 0;
      for (let k = -r; k <= r; k++) {
        const yy = clamp(y + k, 0, h - 1);
        sum  += tmp[yy * w + x] * kernel[k + r];
        wsum += kernel[k + r];
      }
      out[y * w + x] = Math.round(sum / wsum);
    }
  }
  return out;
}

function buildGaussKernel(sigma) {
  const r = Math.ceil(sigma * 3);
  const k = [];
  for (let i = -r; i <= r; i++) k.push(Math.exp(-(i*i) / (2*sigma*sigma)));
  return k;
}

/**
 * Sauvola 適応的二値化
 * T(x,y) = mean(x,y) * [1 + k * (std(x,y)/R - 1)]
 * インテグラルイメージで O(n) 実装
 */
function sauvolaBinarize(gray, w, h, radius, k) {
  const out   = new Uint8Array(w * h);
  const ii    = new Float64Array((w+1) * (h+1)); // インテグラルイメージ（和）
  const ii2   = new Float64Array((w+1) * (h+1)); // インテグラルイメージ（二乗和）

  for (let y = 1; y <= h; y++) {
    for (let x = 1; x <= w; x++) {
      const v = gray[(y-1)*w + (x-1)];
      ii [y*(w+1)+x] = v     + ii [(y-1)*(w+1)+x] + ii [y*(w+1)+(x-1)] - ii [(y-1)*(w+1)+(x-1)];
      ii2[y*(w+1)+x] = v*v   + ii2[(y-1)*(w+1)+x] + ii2[y*(w+1)+(x-1)] - ii2[(y-1)*(w+1)+(x-1)];
    }
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const x1 = Math.max(0, x - radius),   y1 = Math.max(0, y - radius);
      const x2 = Math.min(w - 1, x + radius), y2 = Math.min(h - 1, y + radius);
      const count = (x2 - x1 + 1) * (y2 - y1 + 1);

      const s  = ii [(y2+1)*(w+1)+(x2+1)] - ii [(y1)*(w+1)+(x2+1)] - ii [(y2+1)*(w+1)+(x1)] + ii [y1*(w+1)+x1];
      const s2 = ii2[(y2+1)*(w+1)+(x2+1)] - ii2[(y1)*(w+1)+(x2+1)] - ii2[(y2+1)*(w+1)+(x1)] + ii2[y1*(w+1)+x1];
      const mean = s / count;
      const variance = Math.max(0, s2 / count - mean * mean);
      const std = Math.sqrt(variance);

      // Sauvola 閾値
      const threshold = mean * (1 + k * (std / 128 - 1));
      out[y * w + x] = gray[y * w + x] >= threshold ? 255 : 0;
    }
  }
  return out;
}

function clamp(v, lo = 0, hi = 255) { return Math.min(hi, Math.max(lo, v)); }

// ══════════════════════════════════════════════════
// OCR（② jpn_vert + ③ 前処理統合版）
// ══════════════════════════════════════════════════
async function startOCR() {
  show('step-progress');
  hide('step-error');
  try {
    const isPortrait = cardOrientation === 'portrait';

    // ─── Step A: 前処理 ───────────────────────────
    setProgress(5, '画像を前処理中...');
    const processedData = await preprocessImage(currentImageData, isPortrait);

    // ─── Step B: OCRモデル選択 ────────────────────
    // 縦書き：jpn_vert + jpn（ただし前処理で横回転済みなので jpn も有効）
    // 横書き：jpn + eng
    const langs = isPortrait
      ? ['jpn_vert', 'jpn', 'eng']   // ② jpn_vert を追加
      : ['jpn', 'eng'];

    // 縦書き前処理で横回転済みなので PSM は両方 3（全自動）で良い
    // ただし jpn_vert モデル使用時は PSM 5 の方が語順認識が正確
    const psm = isPortrait ? '5' : '3';

    setProgress(10, '言語モデルを読み込み中...');
    const worker = await Tesseract.createWorker(langs, 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          // 前処理10% + OCR90% の合算進捗
          const ocrPct = Math.round(m.progress * 85);
          setProgress(10 + ocrPct, 'テキスト認識中...');
        } else if (m.status === 'loading language traineddata') {
          setProgress(10, `言語データ読み込み中 (${langs.join(', ')})...`);
        } else if (m.status === 'initializing api') {
          setProgress(10, 'OCRエンジン初期化中...');
        }
      }
    });

    await worker.setParameters({
      tessedit_pageseg_mode:      psm,
      preserve_interword_spaces:  '1',  // 単語間スペース保持（後で除去）
    });

    const { data: { text } } = await worker.recognize(processedData);
    await worker.terminate();

    setProgress(100, '完了');
    hide('step-progress');

    const cleaned = cleanText(text);
    $('ocr-raw').value = cleaned;
    const classified = classify(cleaned);
    renderEditor(classified);
    show('step-classify');
  } catch(err) {
    hide('step-progress');
    showError('OCR処理中にエラーが発生しました。もう一度お試しください。<br><small>' + err.message + '</small>');
    show('step-input');
  }
}

function setProgress(pct, label) {
  $('prog-fill').style.width = pct + '%';
  $('prog-pct').textContent  = pct + '%';
  $('prog-status').textContent = label;
}

// ══════════════════════════════════════════════════
// ⑥ OCR 誤認識補正テーブル
// ══════════════════════════════════════════════════
function correctOcrErrors(line) {
  // ── 法人格の典型的な誤認識 ──────────────────────
  line = line
    .replace(/株[式ポポ式]\s*会\s*社|株\s*[式ポポ]\s*会社/g, '株式会社')
    .replace(/有[限眼]\s*会\s*社/g, '有限会社')
    .replace(/合[同司]\s*会\s*社/g, '合同会社')
    .replace(/一[般般]\s*社[団困]\s*法[人入]/g, '一般社団法人')
    .replace(/医[療擦]\s*法[人入]/g, '医療法人');

  // ── メールアドレスの誤認識 ───────────────────────
  line = line
    .replace(/＠/g, '@')          // 全角@
    .replace(/(?<=\w)[\s　]@/g, '@')
    .replace(/@[\s　](?=\w)/g, '@')
    .replace(/\bGmai[il1]\b/gi, 'Gmail')
    .replace(/\byahoo\.c[o0]\.jp\b/gi, 'yahoo.co.jp')
    .replace(/\.c[o0]m\b/gi, '.com')
    .replace(/\.c[o0]\.jp\b/gi, '.co.jp')
    .replace(/\.ne[t+]\b/gi, '.net');

  // ── 電話番号の誤認識 ─────────────────────────────
  line = line
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)) // 全角数字
    .replace(/[Ｏｏ](?=\d)/g, '0')  // O を 0 に（電話番号文脈）
    .replace(/(?<=\d)[Ｏｏ]/g, '0')
    .replace(/[Ｉｌ|](?=\d)/g, '1') // I/l を 1 に（電話番号文脈）
    .replace(/\bTEし\b/gi, 'TEL')
    .replace(/\bＴＥＬ\b/g, 'TEL')
    .replace(/\bＦＡＸ\b/g, 'FAX');

  // ── 都道府県・住所の誤認識 ───────────────────────
  line = line
    // 〒の誤認識：T/丁/亍 + 数字パターンを〒に統一
    .replace(/^[T丁亍](\d{3})\s*[-－ー]\s*(\d{4})/,      '〒$1-$2')  // 行頭
    .replace(/(?<![A-Za-z])[T丁亍](\d{3})\s*[-－ー]\s*(\d{4})/g, '〒$1-$2')  // 行中
    .replace(/〒\s*(\d{3})\s*[－ー―-]\s*(\d{4})/g, '〒$1-$2')
    .replace(/東[京尿]都/g, '東京都')
    .replace(/大[阪阿]府/g, '大阪府')
    .replace(/神[奈夾]川[県懸]/g, '神奈川県')
    .replace(/愛[知和]県/g, '愛知県')
    .replace(/T目/g, '丁目')
    .replace(/番[纏]地/g, '番地');

  // ── 英語の典型的な誤認識 ────────────────────────
  line = line
    .replace(/\b[Ii]nc[,.]?\b/g, 'Inc.')
    .replace(/\b[Ll]td[,.]?\b/g, 'Ltd.')
    .replace(/\b[Cc]orp[,.]?\b/g, 'Corp.')
    .replace(/\bC[EF]O\b/g, m => m)  // CEO/CFO等は保持
    .replace(/\b0(?=[A-Za-z])/g, 'O') // 数字0→英字O（英単語文脈）
    .replace(/rn\b/g, 'm');            // rn → m の誤認識（Shimomura等）

  return line;
}

// ══════════════════════════════════════════════════
// TEXT CLEANING  ← スペース除去 + OCR誤認識補正
// ══════════════════════════════════════════════════
function cleanText(raw) {
  const JA = '[\u3000-\u9FFF\uF900-\uFAFF\uFF00-\uFFEF]';
  const KA = '[\u30A0-\u30FF]';
  const HI = '[\u3040-\u309F]';
  const KJ = '[\u4E00-\u9FFF]';

  let lines = raw.split(/\r?\n/);
  lines = lines.map(line => {
    // ── ⑥ OCR誤認識補正（スペース除去の前に実施） ──
    line = correctOcrErrors(line);

    // 1. 漢字・かな・全角文字間の半角スペース除去
    for (let i = 0; i < 6; i++) {
      line = line
        .replace(new RegExp('(' + JA + ') +(' + JA + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + KA + ') +(' + KA + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + HI + ') +(' + HI + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + KJ + ') +(' + HI + '|' + KA + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + HI + '|' + KA + ') +(' + KJ + ')', 'g'), '$1$2');
    }

    // 2. メールアドレス内スペース除去
    line = line.replace(/([a-zA-Z0-9._%+\-])\s+@\s*/g, '$1@');
    line = line.replace(/@\s+([a-zA-Z0-9.\-])/g, '@$1');
    line = line.replace(/([a-zA-Z0-9\-])\s+\.\s+([a-zA-Z]{2,})/g, '$1.$2');

    // 3. 電話番号ハイフン前後スペース除去
    line = line.replace(/(\d)\s*[-ー]\s*(\d)/g, '$1-$2');

    // 4. 郵便番号スペース除去
    line = line.replace(/〒\s*(\d{3})\s*[-ー]?\s*(\d{4})/g, '〒$1-$2');

    // 5. 前後トリム
    return line.trim();
  });

  // 連続空行を1行に
  lines = lines.filter((l, i) => l !== '' || (i > 0 && lines[i-1] !== ''));
  return lines.join('\n').trim();
}

/*

  分類ルール定義（強化版）
  ──────────────────────────────────────────────────────────────
  email   : @＋有効ドメイン
  phone   : TEL:/電話: 接頭辞・(市外局番) 形式・標準番号パターン
  address : 〒/都道府県/市区町村/番地/ビル
  company : 法人格キーワード（和英）/ 行頭強調パターン

  ══════════════════════════════════════════════════════════════

// ── 電話番号正規化ヘルパー ─────────────────────────────────
// (03)1234-5678 / (090)1234-5678 / TEL: 03-1234-5678 などに対応
function normalizePhoneLine(raw) {
  // TEL:/FAX:/電話:/直通: などの接頭辞を除去
  let s = raw.replace(/^[\s　]*(?:TEL|FAX|Tel|Fax|電話|直通|携帯|Mobile|HP|代表|内線)\s*[:/：／]?\s*/i, '');
  // 全角数字・括弧を半角に
  s = s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  s = s.replace(/[（]/g, '(').replace(/[）]/g, ')');
  // (03)1234-5678 → 03-1234-5678
  s = s.replace(/\((\d{2,5})\)\s*/g, '$1-');
  // 余分なスペース除去
  s = s.replace(/(\d)\s+(\d)/g, '$1$2');
  return s.trim();
}

// ── 英語人名正規化ヘルパー ─────────────────────────────────
// 大文字化パターンを正規化してマッチ精度を上げる
// JOHN SMITH / john smith / John Smith / JOHN smith → 全て同一判定
function toNameCase(s) {
  return s.toLowerCase().replace(/(^\w|\s\w)/g, c => c.toUpperCase());
}
function looksLikeEnglishName(l) {
  const s = l.trim();
  // 長さ制限：3〜40文字
  if (s.length < 3 || s.length > 40) return false;
  // 数字・記号を含む行は除外
  if (/\d|[@#%&*<>\/\\]/.test(s)) return false;

  // 1. 先頭大文字 Firstname Lastname（標準形）
  if (/^[A-Z][a-z]+(?:\s+[A-Z]\.?)?\s+[A-Z][a-z]+$/.test(s)) return true;

  // 2. 全大文字 FIRSTNAME LASTNAME
  if (/^[A-Z]{2,}(?:\s+[A-Z]\.?)?\s+[A-Z]{2,}$/.test(s)) return true;

  // 3. 全小文字 firstname lastname（OCR誤認識対策）
  if (/^[a-z]{2,}\s+[a-z]{2,}$/.test(s)) return true;

  // 4. 大文字姓・先頭大文字名：SMITH John / Smith JOHN
  if (/^[A-Z]{2,}\s+[A-Z][a-z]+$/.test(s) || /^[A-Z][a-z]+\s+[A-Z]{2,}$/.test(s)) return true;

  // 5. ミドルネーム付き：John M. Smith / JOHN M SMITH
  if (/^[A-Za-z]{2,}\s+[A-Z]\.?\s+[A-Za-z]{2,}$/.test(s)) return true;

  // 6. ハイフン姓：Mary-Jane Watson
  if (/^[A-Z][a-z]+(?:-[A-Z][a-z]+)?\s+[A-Z][a-z]+$/.test(s)) return true;

  return false;
}

// ── 電話番号種別判定ヘルパー ─────────────────────────────
function classifyPhoneType(raw) {
  const prefix = raw.toUpperCase();
  if (/(?:FAX|ファックス|ＦＡＸ)\s*[:/：]/.test(prefix)) return 'fax';
  const num = normalizePhoneLine(raw).replace(/[\s\-]/g, '');
  if (/^(090|080|070|050)\d{8}$/.test(num)) return 'mobile';
  return 'fixed';
}

// ══════════════════════════════════════════════════
// ④ 除外ルール（ネガティブフィルター）
// ── 「これは絶対に氏名・役職ではない」条件 ─────
// ══════════════════════════════════════════════════
const EXCLUDE = {
  // 氏名として除外すべき行の条件
  name: l => [
    l.length > 20,                            // 長すぎる
    /株式会社|有限会社|合同会社/.test(l),      // 法人格
    /@/.test(l),                               // メール
    /\d{4,}/.test(l),                          // 4桁以上の数字
    /TEL|FAX|電話|〒|http|www/i.test(l),       // 連絡先系
    /[。、！？…]/.test(l),                     // 句読点（キャッチコピー）
    l.split(/[\s　]+/).length > 4,             // 単語5つ以上（住所・文章）
    /部|課|室|係|局|本部|センター/.test(l) &&
      /長$|員$|担当$/.test(l),                 // 部署+役職（役職行）
    /都|道|府|県|市|区|町|村/.test(l) &&
      l.length > 8,                            // 住所
  ].some(Boolean),

  // 役職として除外すべき行の条件
  title: l => [
    l.length > 80,
    /@/.test(l),
    /〒|\d{3}-\d{4}/.test(l),                 // 郵便番号
    /^[\d\-\+\(\)]+$/.test(l),               // 数字のみ
    l.split(/[\s　]+/).length > 6,
  ].some(Boolean),

  // 会社名として除外すべき行の条件
  company: l => [
    l.length > 80,
    /@/.test(l),
    /^[\d\-\+\(\)〒]+/.test(l),              // 数字・郵便番号で始まる
    /\d{2,}-\d{2,}-\d{3,}/.test(l),          // 電話番号パターン
  ].some(Boolean),
};

// ══════════════════════════════════════════════════
// 分類メイン関数（4パス版）
// ══════════════════════════════════════════════════
function classify(text) {
  const rawLines = text.split('\n').map(l => l.trim()).filter(l => l.length >= 1);
  const result = {
    email:[], phone_fixed:[], phone_fax:[], phone_mobile:[],
    address:[], company:'', name:'', title:'', other:[]
  };
  const used = new Set();
  const n    = rawLines.length;

  function posRatio(i) { return n <= 1 ? 0.5 : i / (n - 1); }
  function posBonus(field, i) {
    const r = posRatio(i);
    if (field === 'company')     return r < 0.35 ? 2 : r < 0.6 ? 0 : -1;
    if (field === 'name')        return r > 0.2 && r < 0.65 ? 2 : 0;
    if (field === 'title')       return r > 0.25 && r < 0.7 ? 1 : 0;
    if (/phone/.test(field))     return r > 0.5 ? 1 : 0;
    if (field === 'email')       return r > 0.5 ? 1 : 0;
    if (field === 'address')     return r > 0.5 ? 1 : 0;
    return 0;
  }
  function contextBonus(field, i) {
    const prev = i > 0   ? rawLines[i-1] : '';
    const next = i < n-1 ? rawLines[i+1] : '';
    if (field === 'name') {
      if (/株式会社|有限会社|合同会社/.test(prev)) return 2;
      if (RULES.title.strong(next))               return 2;
    }
    if (field === 'title') {
      if (RULES.name.strong(prev) || looksLikeEnglishName(prev)) return 2;
    }
    if (field === 'address') {
      if (/〒\d{3}-\d{4}/.test(prev)) return 3;
      if (RULES.address.strong(prev)) return 2;
    }
    return 0;
  }

  // ③ 住所の複数行マージ
  function mergeAddressLines(startIdx) {
    const parts = [rawLines[startIdx]];
    let j = startIdx + 1;
    while (j < n && j <= startIdx + 3) {
      const next = rawLines[j];
      const isContinue =
        /[都道府県市区町村]|丁目|番地|号|ビル|タワー|棟|階|号室/.test(next) ||
        /^[\d\-\s]+$/.test(next) || /^[A-Za-z\d\s,.\-]+$/.test(next);
      const isNewField =
        RULES.email.strong(next) || RULES.phone.strong(next) ||
        RULES.company.strong(next) || RULES.title.strong(next);
      if (!isContinue || isNewField) break;
      parts.push(next); used.add(j); j++;
    }
    return parts.join(' ');
  }

  // ③ 会社名の複数行マージ
  function mergeCompanyLines(startIdx) {
    const parts = [rawLines[startIdx]];
    let j = startIdx + 1;
    // 直後1行だけ：短い行で他フィールドでなければ社名の続きと判断
    if (j < n) {
      const next = rawLines[j];
      const isNewField =
        RULES.email.strong(next) || RULES.phone.strong(next) ||
        RULES.address.strong(next) || RULES.name.strong(next) ||
        RULES.title.strong(next);
      const looksLikeContinue = next.length > 0 && next.length < 30 &&
        !isNewField && !/[@\d{4,}]/.test(next);
      // 株式会社が次行にある場合も結合
      if (looksLikeContinue || /株式会社|有限会社|合同会社/.test(next)) {
        parts.push(next); used.add(j);
      }
    }
    return parts.join(' ');
  }

  // ── PASS 1: 強ルール ──────────────────────────────
  for (const [fld, rule] of Object.entries(RULES)) {
    for (let i = 0; i < n; i++) {
      if (used.has(i) || !rule.strong(rawLines[i])) continue;
      const l = rawLines[i];
      if (EXCLUDE[fld] && EXCLUDE[fld](l)) continue;
      const score = 3 + posBonus(fld, i) + contextBonus(fld, i);
      if (score < 2) continue;

      if (fld === 'phone') {
        // 電話番号を種別ごとに振り分け
        rule.extract(l).forEach(p => {
          const t = classifyPhoneType(l);
          result['phone_' + t].push(p);
        });
      } else if (fld === 'address') {
        result.address.push(mergeAddressLines(i));
      } else if (fld === 'company') {
        if (!result.company) result.company = mergeCompanyLines(i);
      } else if (fld === 'email') {
        result.email.push(...rule.extract(l));
      } else {
        if (!result[fld]) result[fld] = rule.extract(l)[0];
      }
      used.add(i);
    }
  }

  // ── PASS 2: 弱ルール ──────────────────────────────
  for (const [fld, rule] of Object.entries(RULES)) {
    if (!rule.weak) continue;
    for (let i = 0; i < n; i++) {
      if (used.has(i) || !rule.weak(rawLines[i])) continue;
      const l = rawLines[i];
      if (EXCLUDE[fld] && EXCLUDE[fld](l)) continue;
      const score = 2 + posBonus(fld, i) + contextBonus(fld, i);
      if (score < 2) continue;

      if (fld === 'phone') {
        rule.extract(l).forEach(p => {
          const t = classifyPhoneType(l);
          result['phone_' + t].push(p);
        });
        used.add(i);
      } else if (fld === 'address') {
        result.address.push(mergeAddressLines(i)); used.add(i);
      } else if (fld === 'email') {
        result.email.push(...rule.extract(l)); used.add(i);
      } else if (!result[fld]) {
        result[fld] = rule.extract(l)[0]; used.add(i);
      }
    }
  }

  // ── PASS 3: フォールバック再分類 ─────────────────
  const fallbackLines = [];
  for (let i = 0; i < n; i++) {
    if (used.has(i)) continue;
    const l = rawLines[i];
    if (l.length < 2 || /^[\s\-_=*#|.。、…]+$/.test(l)) continue;
    let assigned = false;

    if (!assigned && /\d{3,}/.test(l) && l.replace(/\D/g,'').length >= 8) {
      const n2 = normalizePhoneLine(l);
      if (/0\d{8,10}/.test(n2.replace(/\D/g,''))) {
        const t = classifyPhoneType(l);
        result['phone_' + t].push(n2);
        used.add(i); assigned = true;
      }
    }
    if (!assigned && !result.name && /^[\u4E00-\u9FFF\u3040-\u30FF]{2,5}$/.test(l)) {
      if (!EXCLUDE.name(l)) { result.name = l; used.add(i); assigned = true; }
    }
    if (!assigned && !result.title &&
        /(?:営業|技術|開発|総務|人事|経営|企画|管理|購買|物流|品質|研究|広報|法務|財務|情報)(?:部|課|室|係|本部|グループ|チーム)/.test(l)) {
      if (!EXCLUDE.title(l)) { result.title = l; used.add(i); assigned = true; }
    }
    if (!assigned && /https?:\/\/|www\./i.test(l)) {
      result.other.push(l); used.add(i); assigned = true;
    }
    if (!assigned) fallbackLines.push(l);
  }

  // ── PASS 4: 残り → other ─────────────────────────
  for (const l of fallbackLines) {
    if (l.length > 80) continue;
    if (/^[・•◆◇■□▶▷]+$/.test(l)) continue;
    if (/^[\d\s\-\.]{1,3}$/.test(l)) continue;
    if (/^(?:E[-\s]?mail|Mail|ホームページ|HP|URL|Website|Web)\s*[:/：]?\s*$/i.test(l)) continue;
    result.other.push(l);
  }

  // ── 後処理：重複除去 ─────────────────────────────
  // ⑦ メール：小文字化して重複排除
  result.email = [...new Map(result.email.map(e => [e.toLowerCase(), e])).values()];
  // ⑦ 電話：ハイフン除去後に比較
  result.phone_fixed  = deduplicatePhones(result.phone_fixed);
  result.phone_fax    = deduplicatePhones(result.phone_fax);
  result.phone_mobile = deduplicatePhones(result.phone_mobile);
  // ⑦ 住所：全角数字を半角化して比較
  result.address = deduplicateAddresses(result.address);
  result.other   = [...new Set(result.other)];

  return result;
}

// 電話番号の重複除去（ハイフン除去後に比較）
function deduplicatePhones(phones) {
  const seen = new Set();
  return phones.filter(p => {
    const key = p.replace(/[\s\-]/g, '');
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

// ⑦ 住所の重複除去（全角数字→半角化後に比較）
function deduplicateAddresses(addrs) {
  const normalize = a => a
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[\s　]/g, '')
    .toLowerCase();
  const seen = new Set();
  return addrs.filter(a => {
    const key = normalize(a);
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

function reclassify() {
  const cleaned = cleanText($('ocr-raw').value.trim());
  $('ocr-raw').value = cleaned;
  renderEditor(classify(cleaned));
}

const FIELDS = [
  { key:'company',      label:'会社名',         icon:'🏢', multi:false },
  { key:'name',         label:'氏名',           icon:'👤', multi:false },
  { key:'title',        label:'役職',           icon:'💼', multi:false },
  { key:'phone_fixed',  label:'固定電話（通話）', icon:'📞', multi:true  },
  { key:'phone_fax',    label:'FAX',            icon:'🖨', multi:true  },
  { key:'phone_mobile', label:'携帯番号',        icon:'📱', multi:true  },
  { key:'email',        label:'メールアドレス',  icon:'📧', multi:true  },
  { key:'address',      label:'住所',           icon:'📍', multi:true  },
  { key:'other',        label:'その他・タグ',    icon:'🏷', multi:true  },
];

function renderEditor(data) {
  $('classify-grid').innerHTML = FIELDS.map(f => {
    const val = Array.isArray(data[f.key]) ? data[f.key].join('\n') : (data[f.key] || '');
    const has = val.trim().length > 0;
    return `<div class="classify-row${has?' matched':''}">
      <span class="field-type-label"><span>${f.icon}</span>${f.label}</span>
      <span class="conf-dot ${has?'conf-high':'conf-low'}" title="${has?'検出':'未検出'}"></span>
      <textarea class="classify-input${f.multi?' multi':''}" id="cf_${f.key}" rows="${f.multi?3:1}" placeholder="${f.label}">${val}</textarea>
    </div>`;
  }).join('');
}

function getEditorValues() {
  const out = {};
  for (const f of FIELDS) {
    const raw = ($('cf_' + f.key)?.value || '').trim();
    out[f.key] = f.multi ? (raw ? raw.split('\n').map(l=>l.trim()).filter(Boolean) : []) : raw;
  }
  return out;
}

// ══════════════════════════════════════════════════
// SAVE / DELETE
// ══════════════════════════════════════════════════
function saveCard() {
  const vals = getEditorValues();
  cards.unshift({ id:Date.now(), ts:new Date().toLocaleString('ja-JP'), rawText:$('ocr-raw').value, ...vals });
  saveCards(); clearAll(); renderCards();
}
function saveCards() { try { localStorage.setItem('meishi_v2', JSON.stringify(cards)); } catch(e){} }
function deleteCard(id) { if (!confirm('この名刺を削除しますか？')) return; cards = cards.filter(c=>c.id!==id); saveCards(); renderCards(); }
function clearAllCards() { if (!confirm('全件削除しますか？')) return; cards=[]; saveCards(); renderCards(); }

// ══════════════════════════════════════════════════
// CLEAR
// ══════════════════════════════════════════════════
function clearAll() {
  currentImageData = null;
  if (cropper) { cropper.destroy(); cropper = null; }
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  ['step-crop','step-progress','step-classify','step-error','cam-wrap'].forEach(hide);
  show('step-input'); show('drop-zone');
  $('prog-fill').style.width='0%'; $('prog-pct').textContent='0%'; $('prog-status').textContent='初期化中...';
  // 向きはリセットせず保持（次の名刺も同じ向きが多いため）
}
function showError(msg) { const e=$('step-error'); e.style.display='block'; e.innerHTML=`<div class="error-msg">⚠️ ${msg}</div>`; }

function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/[\s　]+/);
  return p.length>=2 ? p[0][0]+p[p.length-1][0] : name.slice(0,2);
}

function frow(ic, label, content) {
  return `<div class="field"><div class="field-ic"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:1.8">${IC[ic]}</svg></div><div style="flex:1;min-width:0"><div class="f-label">${label}</div>${content}</div></div>`;

// タグクリックで検索フィールドにセット
function searchByTag(tag) {
  const s = $('search');
  if (!s) return;
  s.value = tag;
  renderCards();
  s.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderCards() {
  const raw = ($('search')?.value || '').trim();
  const q   = raw.toLowerCase();

  // タグ検索：#タグ または 通常テキスト両対応
  const filtered = q ? cards.filter(c => {
    const allOther = (c.other || []).join(' ').toLowerCase();
    return (
      (c.name        || '').toLowerCase().includes(q) ||
      (c.company     || '').toLowerCase().includes(q) ||
      (c.title       || '').toLowerCase().includes(q) ||
      (c.email       || []).join(' ').toLowerCase().includes(q) ||
      (c.phone_fixed || []).join(' ').includes(q) ||
      (c.phone_mobile|| []).join(' ').includes(q) ||
      (c.phone_fax   || []).join(' ').includes(q) ||
      (c.address     || []).join(' ').toLowerCase().includes(q) ||
      allOther.includes(q) ||
      (c.rawText     || '').toLowerCase().includes(q)
    );
  }) : cards;

  $('card-meta').textContent = cards.length + '件';
  $('export-area').style.display = cards.length > 0 ? 'block' : 'none';

  const list = $('cards-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>
      <div class="empty-title">${cards.length === 0 ? '名刺がまだ登録されていません' : '検索結果がありません'}</div>
      <div class="empty-sub">${cards.length === 0 ? '左パネルから名刺を読み込んでください' :
        q ? `「${raw}」に一致する名刺が見つかりませんでした` : ''}</div></div>`;
    return;
  }

  // 検索ヒット件数バッジ
  if (q && filtered.length < cards.length) {
    $('card-meta').textContent = `${filtered.length} / ${cards.length}件`;
  }

  list.innerHTML = filtered.map(c => {
    const fixed   = (c.phone_fixed  || []).filter(Boolean);
    const fax     = (c.phone_fax    || []).filter(Boolean);
    const mobile  = (c.phone_mobile || []).filter(Boolean);
    // 旧データ互換：phone フィールドが残っていれば fixed 扱い
    const legacyPhone = (c.phone || []).filter(Boolean);
    const allFixed = [...fixed, ...legacyPhone];

    const emails  = (c.email   || []).filter(Boolean);
    const addrs   = (c.address || []).filter(Boolean);
    const others  = (c.other   || []).filter(Boolean);

    // タグ：クリックで検索できるチップ
    const tagChips = others.map(o => {
      const esc = o.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
      return `<span class="tag" style="cursor:pointer" onclick="searchByTag('${esc}')" title="このタグで検索">${o}</span>`;
    }).join('');

    const rows = [
      allFixed.length  ? frow('tel',    '固定電話',      allFixed.map(p  => `<div class="f-val mono">${p}</div>`).join('')) : '',
      fax.length       ? frow('fax',    'FAX',           fax.map(p       => `<div class="f-val mono">${p}</div>`).join('')) : '',
      mobile.length    ? frow('mobile', '携帯番号',      mobile.map(p    => `<div class="f-val mono">${p}</div>`).join('')) : '',
      emails.length    ? frow('mail',   'メールアドレス', emails.map(e   => `<div class="f-val mono">${e}</div>`).join('')) : '',
      addrs.length     ? frow('map',    '住所',          addrs.map(a     => `<div class="f-val">${a}</div>`).join('')) : '',
      others.length    ? frow('tag',    'その他・タグ',  `<div class="tag-list">${tagChips}</div>`) : '',
    ].filter(Boolean).join('');

    return `<div class="card">
      <div class="card-head">
        <div class="avatar">${initials(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${c.name || '（氏名不明）'}</div>
          <div class="card-pos">${c.title || ''}</div>
        </div>
        ${c.company ? `<div class="company-pill" title="${c.company}">${c.company}</div>` : ''}
      </div>
      <div>${rows || `<div class="field"><span style="font-size:12px;color:var(--text3)">連絡先情報が見つかりませんでした</span></div>`}</div>
      <div class="card-foot">
        <span class="card-ts">${c.ts}</span>
        <div style="display:flex;gap:6px">
          <button class="btn-sm" onclick="showRaw(${c.id})">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>OCR原文
          </button>
          <button class="btn-sm btn-danger" onclick="deleteCard(${c.id})">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>削除
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showRaw(id) {
  const c = cards.find(x => x.id === id); if (!c) return;
  const w = window.open('', '_blank', 'width=520,height=440');
  w.document.write(`<pre style="font-family:monospace;padding:16px;white-space:pre-wrap;word-break:break-word;font-size:13px">${c.rawText || ''}</pre>`);
  w.document.close();
}

// ══════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════
function buildRows() {
  return cards.map(c => {
    // 旧データ互換（phone → phone_fixed）
    const fixed  = [...(c.phone_fixed  || []), ...(c.phone || [])];
    const fax    =   (c.phone_fax    || []);
    const mobile =   (c.phone_mobile || []);
    return {
      '登録日時':         c.ts || '',
      '会社名':           c.company || '',
      '氏名':             c.name || '',
      '役職':             c.title || '',
      '固定電話1':        fixed[0]  || '',
      '固定電話2':        fixed[1]  || '',
      'FAX':              fax[0]    || '',
      '携帯番号':         mobile[0] || '',
      'メールアドレス1':  (c.email || [])[0] || '',
      'メールアドレス2':  (c.email || [])[1] || '',
      '住所':             (c.address || []).join(' '),
      'タグ・その他':     (c.other   || []).join(' / '),
    };
  });
}

function exportExcel() {
  if (!cards.length) { alert('エクスポートする名刺がありません。'); return; }
  const rows = buildRows();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    {wch:18},{wch:26},{wch:14},{wch:22},
    {wch:16},{wch:16},{wch:16},{wch:16},
    {wch:30},{wch:30},{wch:36},{wch:32}
  ];
  const range = XLSX.utils.decode_range(ws['!ref']);
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0},e:{r:0,c:range.e.c}}) };
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '名刺リスト');
  const meta = XLSX.utils.aoa_to_sheet([
    ['エクスポート日時', new Date().toLocaleString('ja-JP')],
    ['件数', cards.length + '件'],
    ['作成ツール', '名刺スキャナー（ブラウザ）'],
  ]);
  meta['!cols'] = [{wch:20},{wch:32}];
  XLSX.utils.book_append_sheet(wb, meta, '概要');
  XLSX.writeFile(wb, '名刺リスト_' + new Date().toLocaleDateString('ja-JP').replace(/\//g,'-') + '.xlsx');
}

function exportCSV() {
  if (!cards.length) { alert('エクスポートする名刺がありません。'); return; }
  const rows = buildRows(), headers = Object.keys(rows[0]);
  const csv = '\uFEFF' + [
    headers.map(h => `"${h}"`).join(','),
    ...rows.map(r => headers.map(h => `"${String(r[h]).replace(/"/g,'""')}"`).join(','))
  ].join('\r\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'})),
    download: '名刺リスト_' + new Date().toLocaleDateString('ja-JP').replace(/\//g,'-') + '.csv'
  });
  a.click();
}

function printCards() {
  if (!cards.length) { alert('印刷する名刺がありません。'); return; }
  const rows = buildRows(), headers = Object.keys(rows[0]);
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>名刺リスト</title><style>
body{font-family:'Hiragino Sans',sans-serif;font-size:11px;margin:16px;color:#111}
h2{font-size:14px;margin-bottom:4px}p{font-size:11px;color:#666;margin-bottom:14px}
table{border-collapse:collapse;width:100%}
th{background:#2d5a3d;color:#fff;padding:6px 8px;font-size:10px;font-weight:600;text-align:left;white-space:nowrap}
td{border:1px solid #ddd;padding:5px 8px;vertical-align:top}
tr:nth-child(even) td{background:#f5f8f5}
@media print{@page{margin:10mm}}
</style></head><body>
<h2>名刺リスト</h2>
<p>${new Date().toLocaleString('ja-JP')} 時点 ／ ${cards.length}件</p>
<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
<tbody>${rows.map(r=>`<tr>${headers.map(h=>`<td>${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
</table></body></html>`);
  w.document.close(); setTimeout(() => w.print(), 400);
}

renderCards();
</script>
</body>
