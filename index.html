<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名刺スキャナー</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd6;
    --border2: #ccc7be;
    --text: #1a1815;
    --text2: #6b6560;
    --text3: #a09b94;
    --accent: #2d5a3d;
    --accent-bg: #e8f0eb;
    --accent-border: #b5d0bb;
    --accent-text: #1d3d29;
    --danger: #8b2020;
    --danger-bg: #fdf0f0;
    --warn: #7a5a00;
    --warn-bg: #fdf8e8;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Layout */
  .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky; top: 0; z-index: 100;
  }

  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .topbar-logo svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 1.8; }
  .topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-left: 4px; }
  .topbar-badge {
    margin-left: auto;
    font-size: 11px;
    background: var(--accent-bg);
    color: var(--accent-text);
    border: 1px solid var(--accent-border);
    border-radius: 99px;
    padding: 3px 10px;
    font-weight: 500;
  }

  .main { display: flex; flex: 1; gap: 0; }

  /* Left panel */
  .panel-left {
    width: 360px;
    flex-shrink: 0;
    padding: 24px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Right panel */
  .panel-right {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    background: var(--bg);
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    background: var(--bg);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }

  .dz-icon {
    width: 48px; height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
  }

  .dz-icon svg { width: 22px; height: 22px; stroke: var(--text3); fill: none; stroke-width: 1.5; }
  .dz-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .dz-sub { font-size: 12px; color: var(--text3); line-height: 1.6; }

  /* Buttons */
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }

  button {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    transition: background .15s, transform .1s, border-color .15s;
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 400;
    white-space: nowrap;
  }

  button:hover { background: var(--surface2); border-color: var(--border2); }
  button:active { transform: scale(0.97); }

  button svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-primary:hover { background: #245032; border-color: #245032; }

  .btn-danger { color: var(--danger); border-color: #e8c0c0; }
  .btn-danger:hover { background: var(--danger-bg); }

  .btn-sm { font-size: 12px; padding: 5px 10px; }

  /* Preview */
  .preview-wrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
  }

  .preview-wrap img {
    width: 100%; display: block;
    max-height: 200px; object-fit: contain;
    background: var(--surface2);
  }

  .preview-close {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }

  .preview-close svg { width: 13px; height: 13px; stroke: var(--text2); fill: none; stroke-width: 2; }

  /* Progress */
  .progress-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width .3s ease;
    width: 0%;
  }

  .progress-label { font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; }

  /* OCR text box */
  .ocr-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }

  .ocr-box-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

  textarea {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    resize: vertical;
    min-height: 120px;
    line-height: 1.6;
  }

  textarea:focus { outline: none; border-color: var(--accent); }

  /* Camera */
  .camera-wrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
  }

  video { width: 100%; display: block; max-height: 220px; object-fit: cover; }
  canvas { display: none; }

  .cam-guide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .cam-frame {
    width: 88%; aspect-ratio: 1.75;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 6px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }

  /* Right panel - card list */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }

  .list-title { font-size: 15px; font-weight: 700; }

  .list-meta { font-size: 12px; color: var(--text3); }

  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 36px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 1.8; pointer-events: none; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-head {
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent-bg);
    color: var(--accent-text);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    border: 1px solid var(--accent-border);
  }

  .card-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .card-title { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .company-pill {
    margin-left: auto; flex-shrink: 0;
    font-size: 11px; font-weight: 500;
    padding: 4px 10px;
    border-radius: 99px;
    background: var(--accent-bg);
    color: var(--accent-text);
    border: 1px solid var(--accent-border);
    max-width: 140px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .card-body { padding: 0; }

  .field {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .field:last-child { border-bottom: none; }

  .field-ic {
    width: 26px; height: 26px; flex-shrink: 0;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  .field-ic svg { width: 12px; height: 12px; stroke: var(--text3); fill: none; stroke-width: 1.8; }

  .f-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; font-weight: 500; letter-spacing: 0.3px; }
  .f-val { color: var(--text); line-height: 1.5; }
  .f-val.mono { font-family: 'DM Mono', monospace; font-size: 12px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: var(--radius-sm); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }

  .card-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .card-ts { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* Export bar */
  .export-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 12px; line-height: 1.7; }

  /* Notice */
  .notice {
    font-size: 12px;
    background: var(--warn-bg);
    border: 1px solid #e8d888;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--warn);
    line-height: 1.6;
  }

  .notice strong { font-weight: 700; }

  /* Error */
  .error-msg {
    font-size: 12px;
    background: var(--danger-bg);
    border: 1px solid #e8c0c0;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--danger);
    line-height: 1.6;
  }

  /* Divider */
  .divider { height: 1px; background: var(--border); }

  /* Responsive */
  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .panel-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .topbar-sub { display: none; }
  }
</style>
</head>
<body>

<div class="app-shell">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M6 10h5M6 14h8"/></svg>
    </div>
    <span class="topbar-title">名刺スキャナー</span>
    <span class="topbar-sub">— 無料・ブラウザのみ</span>
    <span class="topbar-badge">完全無料 / APIキー不要</span>
  </header>

  <div class="main">
    <!-- Left: scan panel -->
    <aside class="panel-left">

      <!-- Drop zone (default) -->
      <div class="drop-zone" id="drop-zone">
        <div class="dz-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p class="dz-title">名刺画像をドラッグ&ドロップ</p>
        <p class="dz-sub">JPG・PNG・WebP 対応<br>または下のボタンから読み込む</p>
        <div class="btn-group">
          <button onclick="document.getElementById('file-input').click()">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            ファイル選択
          </button>
          <button onclick="startCamera()" id="cam-btn">
            <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            カメラ撮影
          </button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>

      <!-- Camera view -->
      <div id="cam-wrap" style="display:none">
        <div class="camera-wrap">
          <video id="video" autoplay playsinline muted></video>
          <div class="cam-guide"><div class="cam-frame"></div></div>
          <canvas id="canvas"></canvas>
        </div>
        <div class="btn-group" style="margin-top:10px">
          <button class="btn-primary" onclick="capturePhoto()">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/></svg>
            撮影
          </button>
          <button onclick="stopCamera()">キャンセル</button>
        </div>
      </div>

      <!-- Preview -->
      <div id="preview-wrap" style="display:none">
        <div class="preview-wrap">
          <img id="preview-img" alt="プレビュー">
          <button class="preview-close" onclick="clearAll()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="btn-group" style="margin-top:10px">
          <button class="btn-primary" onclick="startOCR()">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            OCRで読み取る
          </button>
          <button onclick="clearAll()">キャンセル</button>
        </div>
      </div>

      <!-- Progress -->
      <div id="progress-wrap" style="display:none">
        <div class="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
          <div class="progress-label">
            <span id="prog-status">初期化中...</span>
            <span id="prog-pct">0%</span>
          </div>
        </div>
      </div>

      <!-- OCR result editable -->
      <div id="ocr-edit-wrap" style="display:none">
        <div class="ocr-box">
          <div class="ocr-box-label">📄 OCR 読み取り結果（編集可能）</div>
          <textarea id="ocr-text" rows="8" placeholder="OCRテキストがここに表示されます..."></textarea>
        </div>
        <div class="btn-group" style="margin-top:10px">
          <button class="btn-primary" onclick="parseAndSave()">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            データとして保存
          </button>
          <button onclick="clearAll()">やり直す</button>
        </div>
        <div class="notice" style="margin-top:10px">
          <strong>ヒント：</strong> OCR結果が正しくない場合は上のテキストを直接編集してから保存できます。
        </div>
      </div>

      <!-- Error -->
      <div id="error-wrap" style="display:none"></div>

      <div class="divider"></div>

      <div class="notice">
        <strong>🔒 プライバシー：</strong>画像・データはすべてブラウザ内で処理されます。外部サーバーには送信されません。
      </div>
    </aside>

    <!-- Right: card list -->
    <main class="panel-right">
      <div class="list-header">
        <span class="list-title">登録済み名刺</span>
        <span class="list-meta" id="card-meta">0件</span>
      </div>

      <div id="export-bar" style="display:none">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;">
          <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">出力・エクスポート</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <button onclick="exportExcel()" style="background:#1d6f42;color:#fff;border-color:#1a6038;font-weight:500;">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              Excel (.xlsx)
            </button>
            <button onclick="exportCSV()" style="background:#1a4e7a;color:#fff;border-color:#174469;font-weight:500;">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              CSV (.csv)
            </button>
            <button onclick="printCards()">
              <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              印刷
            </button>
            <button onclick="clearAllCards()" class="btn-danger" style="margin-left:auto;">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              全件削除
            </button>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:8px;">Excelは書式付き・列幅自動調整・フィルター付きで出力されます</div>
        </div>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="名前・会社・メールで検索..." oninput="renderCards()">
        </div>
      </div>

      <div id="cards-list"></div>
    </main>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────
let cards = JSON.parse(localStorage.getItem('meishi_cards') || '[]');
let currentImageData = null;
let stream = null;

// ─── DOM helpers ─────────────────────────────────────
const $ = id => document.getElementById(id);
const show = id => $(id).style.display = 'block';
const hide = id => $(id).style.display = 'none';

// ─── Drop zone ───────────────────────────────────────
const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

$('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadFile(f);
  e.target.value = '';
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    currentImageData = ev.target.result;
    $('preview-img').src = currentImageData;
    hide('drop-zone');
    show('preview-wrap');
    hide('error-wrap');
  };
  reader.readAsDataURL(file);
}

// ─── Camera ──────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    $('video').srcObject = stream;
    hide('drop-zone');
    show('cam-wrap');
  } catch(e) {
    showError('カメラへのアクセスが許可されていません。ファイル選択をご利用ください。');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  hide('cam-wrap');
  show('drop-zone');
}

function capturePhoto() {
  const v = $('video');
  const c = $('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  currentImageData = c.toDataURL('image/jpeg', 0.95);
  $('preview-img').src = currentImageData;
  stopCamera();
  show('preview-wrap');
}

// ─── OCR ─────────────────────────────────────────────
async function startOCR() {
  if (!currentImageData) return;
  hide('preview-wrap');
  show('progress-wrap');
  hide('error-wrap');

  try {
    const worker = await Tesseract.createWorker(['jpn', 'eng'], 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          $('prog-fill').style.width = pct + '%';
          $('prog-pct').textContent = pct + '%';
          $('prog-status').textContent = 'テキスト認識中...';
        } else if (m.status === 'loading language traineddata') {
          $('prog-status').textContent = '言語データ読み込み中...';
        } else if (m.status === 'initializing api') {
          $('prog-status').textContent = '初期化中...';
        }
      }
    });

    const { data: { text } } = await worker.recognize(currentImageData);
    await worker.terminate();

    hide('progress-wrap');
    $('ocr-text').value = text.trim();
    show('ocr-edit-wrap');
  } catch(err) {
    hide('progress-wrap');
    show('preview-wrap');
    showError('OCR処理中にエラーが発生しました。もう一度お試しください。\n' + err.message);
  }
}

// ─── Parsing ─────────────────────────────────────────
function parseText(raw) {
  const lines = raw.split(/\n/).map(l => l.trim()).filter(Boolean);
  const text = raw;

  // Email
  const emails = [...new Set((text.match(/[\w._%+\-]+@[\w.\-]+\.[a-z]{2,}/gi) || []))];

  // Phone (JP & international)
  const phones = [...new Set((text.match(
    /(?:\+?81[-\s]?)?(?:0\d{1,4}[-\s（）]?\d{1,4}[-\s（）]?\d{3,4})/g
  ) || []).map(p => p.replace(/[（）\s]/g, '')))];

  // URL / website
  const websites = [...new Set((text.match(/https?:\/\/[^\s\n]+|www\.[^\s\n]+/gi) || []))];

  // Company patterns
  const companyPatterns = [
    /([^\s\n]*(?:株式会社|有限会社|合同会社|合資会社|一般社団法人|公益社団法人|医療法人|社会福祉法人)[^\s\n]*)/,
    /([^\s\n]+(?:株式会社|有限会社)[^\s\n]*)/,
    /([A-Z][a-zA-Z\s&.]+(?:Inc\.|Corp\.|Ltd\.|LLC|Co\.|GmbH|S\.A\.)[^\s\n]*)/,
    /(株式会社[^\s\n]+)/,
  ];

  let company = '';
  for (const p of companyPatterns) {
    const m = text.match(p);
    if (m) { company = m[1].trim(); break; }
  }

  // Name: Japanese names (2-4 kanji) or Firstname Lastname (English)
  let name = '';
  // Try to find a name line (not company, not email, not phone, not URL)
  const skipLine = line =>
    emails.some(e => line.includes(e)) ||
    phones.some(p => line.includes(p.slice(0,6))) ||
    websites.some(w => line.includes(w.slice(0,10))) ||
    line.includes('株式会社') || line.includes('有限会社') || line.includes('合同会社') ||
    line.includes('@') || /^\d/.test(line) || line.length > 30;

  // Look for 2-4 kanji-only lines (likely Japanese name)
  for (const line of lines) {
    if (skipLine(line)) continue;
    if (/^[\u4E00-\u9FFF\u3040-\u30FF]{2,5}(\s+[\u4E00-\u9FFF\u3040-\u30FF]{1,5})?$/.test(line)) {
      name = line; break;
    }
  }

  // English name fallback: Firstname Lastname pattern
  if (!name) {
    for (const line of lines) {
      if (skipLine(line)) continue;
      if (/^[A-Z][a-z]+(\s+[A-Z]\.?)?\s+[A-Z][a-z]+$/.test(line)) {
        name = line; break;
      }
    }
  }

  // Title / position
  const titleKeywords = ['部長','課長','係長','主任','代表取締役','取締役','社長','専務','常務','執行役員','Director','Manager','CEO','CTO','CFO','President','Engineer','Designer','Consultant','担当','マネージャー','エンジニア','デザイナー'];
  let title = '';
  for (const line of lines) {
    for (const kw of titleKeywords) {
      if (line.includes(kw) && !line.includes('@') && line.length < 40) {
        title = line; break;
      }
    }
    if (title) break;
  }

  // Address
  let address = '';
  const addrMatch = text.match(/〒?\d{3}[-ー]\d{4}[^\n]*/);
  if (addrMatch) address = addrMatch[0].trim();
  if (!address) {
    for (const line of lines) {
      if (/[都道府県市区町村]/.test(line) && line.length > 5 && line.length < 60) {
        address = line; break;
      }
    }
  }

  // Notes: remaining interesting lines
  const usedContent = [company, name, title, address, ...emails, ...phones, ...websites].filter(Boolean);
  const notes = lines.filter(line => {
    if (line.length < 2 || line.length > 50) return false;
    if (skipLine(line)) return false;
    if (usedContent.some(u => line.includes(u.slice(0,8)) || u.includes(line))) return false;
    if (line === name || line === title || line === company || line === address) return false;
    // Skip lines that are obviously noise
    if (/^[\s\-_=*#|]+$/.test(line)) return false;
    return true;
  }).slice(0, 5);

  return { company, name, title, phones, emails, websites, address, notes };
}

// ─── Save card ───────────────────────────────────────
function parseAndSave() {
  const raw = $('ocr-text').value.trim();
  if (!raw) { showError('テキストが空です。OCRを再実行するか手動入力してください。'); return; }

  const parsed = parseText(raw);
  const card = {
    id: Date.now(),
    ts: new Date().toLocaleString('ja-JP'),
    rawText: raw,
    ...parsed
  };

  cards.unshift(card);
  saveCards();
  clearAll();
  renderCards();
}

function saveCards() {
  try { localStorage.setItem('meishi_cards', JSON.stringify(cards)); } catch(e) {}
}

function deleteCard(id) {
  if (!confirm('この名刺を削除しますか？')) return;
  cards = cards.filter(c => c.id !== id);
  saveCards(); renderCards();
}

function clearAllCards() {
  if (!confirm('全件削除しますか？')) return;
  cards = []; saveCards(); renderCards();
}

// ─── UI helpers ──────────────────────────────────────
function clearAll() {
  currentImageData = null;
  hide('preview-wrap'); hide('progress-wrap'); hide('ocr-edit-wrap'); hide('error-wrap'); hide('cam-wrap');
  show('drop-zone');
  $('prog-fill').style.width = '0%';
  $('prog-pct').textContent = '0%';
  $('prog-status').textContent = '初期化中...';
}

function showError(msg) {
  $('error-wrap').style.display = 'block';
  $('error-wrap').innerHTML = `<div class="error-msg">⚠️ ${msg.replace(/\n/g,'<br>')}</div>`;
}

function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/\s+/);
  if (p.length >= 2) return p[0][0] + p[p.length-1][0];
  return name.slice(0,2);
}

// ─── Render ──────────────────────────────────────────
function renderCards() {
  const q = ($('search')?.value || '').toLowerCase();
  const filtered = q ? cards.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.company||'').toLowerCase().includes(q) ||
    (c.emails||[]).join(' ').toLowerCase().includes(q) ||
    (c.rawText||'').toLowerCase().includes(q)
  ) : cards;

  $('card-meta').textContent = cards.length + '件';
  $('export-bar').style.display = cards.length > 0 ? 'block' : 'none';

  const list = $('cards-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">${cards.length === 0 ? '名刺がまだ登録されていません' : '検索結果がありません'}</div>
      <div class="empty-sub">${cards.length === 0 ? '左パネルから名刺画像を読み込んでください' : '別のキーワードをお試しください'}</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const phones = (c.phones||[]).filter(Boolean);
    const emails = (c.emails||[]).filter(Boolean);
    const websites = (c.websites||[]).filter(Boolean);
    const notes = (c.notes||[]).filter(Boolean);

    const rows = [
      phones.length ? row('tel', 'phone', '電話番号', phones.map(p=>`<span class="f-val mono">${p}</span>`).join('')) : '',
      emails.length ? row('mail', 'email', 'メール', emails.map(e=>`<span class="f-val mono">${e}</span>`).join('')) : '',
      c.address ? row('map', 'address', '住所', `<span class="f-val">${c.address}</span>`) : '',
      websites.length ? row('web', 'website', 'Web', websites.map(w=>`<span class="f-val mono">${w}</span>`).join('')) : '',
      notes.length ? row('tag', 'notes', 'メモ', `<div class="tag-list">${notes.map(n=>`<span class="tag">${n}</span>`).join('')}</div>`) : '',
    ].filter(Boolean).join('');

    return `<div class="card" id="c${c.id}">
      <div class="card-head">
        <div class="avatar">${initials(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${c.name || '（氏名不明）'}</div>
          <div class="card-title">${c.title || ''}</div>
        </div>
        ${c.company ? `<div class="company-pill" title="${c.company}">${c.company}</div>` : ''}
      </div>
      <div class="card-body">
        ${rows || `<div class="field"><span style="font-size:12px;color:var(--text3)">連絡先情報が見つかりませんでした — OCRテキストを確認してください</span></div>`}
      </div>
      <div class="card-foot">
        <span class="card-ts">${c.ts}</span>
        <div style="display:flex;gap:6px">
          <button class="btn-sm" onclick="showRaw(${c.id})">
            <svg viewBox="0 0 24 24" style="width:12px;height:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            テキスト
          </button>
          <button class="btn-sm btn-danger" onclick="deleteCard(${c.id})">
            <svg viewBox="0 0 24 24" style="width:12px;height:12px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            削除
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function row(type, cls, label, content) {
  const icons = {
    tel: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/>',
    mail: '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
    map: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
    web: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
    tag: '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>',
  };
  return `<div class="field">
    <div class="field-ic"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:1.8">${icons[type]}</svg></div>
    <div style="flex:1;min-width:0"><div class="f-label">${label}</div>${content}</div>
  </div>`;
}

function showRaw(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  const w = window.open('', '_blank', 'width=500,height=400');
  w.document.write(`<pre style="font-family:monospace;padding:16px;white-space:pre-wrap;word-break:break-word">${c.rawText}</pre>`);
}

// ─── Shared data builder ─────────────────────────────
function buildRows() {
  return cards.map(c => ({
    '登録日時':     c.ts || '',
    '会社名':       c.company || '',
    '氏名':         c.name || '',
    '役職':         c.title || '',
    '電話番号1':    (c.phones||[])[0] || '',
    '電話番号2':    (c.phones||[])[1] || '',
    'メール1':      (c.emails||[])[0] || '',
    'メール2':      (c.emails||[])[1] || '',
    '住所':         c.address || '',
    'ウェブサイト': (c.websites||[])[0] || '',
    'SNS・その他':  (c.notes||[]).join(' / '),
  }));
}

// ─── Excel Export (.xlsx) ────────────────────────────
function exportExcel() {
  if (!cards.length) { alert('エクスポートする名刺がありません。'); return; }
  if (typeof XLSX === 'undefined') { alert('Excel出力ライブラリの読み込みに失敗しました。CSVをお試しください。'); return; }

  const rows = buildRows();
  const ws = XLSX.utils.json_to_sheet(rows);

  // Column widths
  const colWidths = [
    { wch: 18 }, // 登録日時
    { wch: 24 }, // 会社名
    { wch: 14 }, // 氏名
    { wch: 18 }, // 役職
    { wch: 16 }, // 電話番号1
    { wch: 16 }, // 電話番号2
    { wch: 28 }, // メール1
    { wch: 28 }, // メール2
    { wch: 32 }, // 住所
    { wch: 28 }, // ウェブサイト
    { wch: 24 }, // SNS・その他
  ];
  ws['!cols'] = colWidths;

  // Auto filter on header row
  const range = XLSX.utils.decode_range(ws['!ref']);
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: 0, c: range.e.c } }) };

  // Freeze top row
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '名刺リスト');

  // Meta sheet
  const metaData = [
    ['エクスポート日時', new Date().toLocaleString('ja-JP')],
    ['件数', cards.length + '件'],
    ['作成ツール', '名刺スキャナー（ブラウザアプリ）'],
  ];
  const wsMeta = XLSX.utils.aoa_to_sheet(metaData);
  wsMeta['!cols'] = [{ wch: 20 }, { wch: 30 }];
  XLSX.utils.book_append_sheet(wb, wsMeta, '概要');

  const fname = '名刺リスト_' + new Date().toLocaleDateString('ja-JP').replace(/\//g,'-') + '.xlsx';
  XLSX.writeFile(wb, fname);
}

// ─── CSV Export (.csv) ───────────────────────────────
function exportCSV() {
  if (!cards.length) { alert('エクスポートする名刺がありません。'); return; }
  const rows = buildRows();
  const headers = Object.keys(rows[0]);
  const lines = [
    headers.map(h => `"${h}"`).join(','),
    ...rows.map(r => headers.map(h => `"${String(r[h]).replace(/"/g,'""')}"`).join(','))
  ];
  const csv = '\uFEFF' + lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '名刺リスト_' + new Date().toLocaleDateString('ja-JP').replace(/\//g,'-') + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ─── Print ───────────────────────────────────────────
function printCards() {
  if (!cards.length) { alert('印刷する名刺がありません。'); return; }
  const rows = buildRows();
  const headers = Object.keys(rows[0]);
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8">
<title>名刺リスト</title>
<style>
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; font-size: 11px; margin: 16px; color: #111; }
  h2 { font-size: 14px; margin-bottom: 4px; }
  p { font-size: 11px; color: #666; margin-bottom: 14px; }
  table { border-collapse: collapse; width: 100%; }
  th { background: #1d6f42; color: #fff; padding: 6px 8px; text-align: left; font-size: 10px; font-weight: 600; white-space: nowrap; }
  td { border: 1px solid #ddd; padding: 5px 8px; vertical-align: top; }
  tr:nth-child(even) td { background: #f5f8f5; }
  @media print { @page { margin: 10mm; } }
</style>
</head><body>
<h2>名刺リスト</h2>
<p>${new Date().toLocaleString('ja-JP')} 時点 / ${cards.length}件</p>
<table>
<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
<tbody>${rows.map(r=>`<tr>${headers.map(h=>`<td>${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
</table>
</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 400);
}

// ─── Init ────────────────────────────────────────────
renderCards();
</script>
