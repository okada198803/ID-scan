<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名刺スキャナー</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;--surface:#fff;--surface2:#f0ede8;
  --border:#e2ddd6;--border2:#ccc7be;
  --text:#1a1815;--text2:#6b6560;--text3:#a09b94;
  --accent:#2d5a3d;--accent-bg:#e8f0eb;--accent-border:#b5d0bb;--accent-text:#1d3d29;
  --danger:#8b2020;--danger-bg:#fdf0f0;
  --warn:#7a5a00;--warn-bg:#fdf8e8;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-shell{display:flex;flex-direction:column;min-height:100vh}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.topbar-logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.topbar-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.8}
.topbar-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.topbar-sub{font-size:12px;color:var(--text3);margin-left:4px}
.topbar-badge{margin-left:auto;font-size:11px;background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border);border-radius:99px;padding:3px 10px;font-weight:500}

.main{display:flex;flex:1}
.panel-left{width:380px;flex-shrink:0;padding:20px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
.panel-right{flex:1;padding:20px;overflow-y:auto;background:var(--bg)}

button{font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:background .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;font-weight:400;white-space:nowrap}
button:hover{background:var(--surface2)}
button:active{transform:scale(.97)}
button svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.btn-primary:hover{background:#245032;border-color:#245032}
.btn-danger{color:var(--danger);border-color:#e8c0c0}
.btn-danger:hover{background:var(--danger-bg)}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}

.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-bg)}
.dz-icon{width:44px;height:44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.dz-icon svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:1.5}
.dz-title{font-size:14px;font-weight:500;margin-bottom:4px}
.dz-sub{font-size:12px;color:var(--text3);line-height:1.6}

.sec-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

.camera-wrap{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#000}
video{width:100%;display:block;max-height:220px;object-fit:cover}
canvas{display:none}
.cam-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-frame{width:88%;aspect-ratio:1.75;border:2px solid rgba(255,255,255,.7);border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,.4)}

.cropper-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.crop-img-wrap{max-height:280px;overflow:hidden;border-radius:var(--radius-sm);background:#111}
.crop-img-wrap img{display:block;max-width:100%}
.crop-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

.progress-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.progress-bar-bg{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:10px}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s ease;width:0%}
.progress-label{font-size:12px;color:var(--text2);display:flex;justify-content:space-between}

.classify-grid{display:flex;flex-direction:column;gap:8px}
.classify-row{display:flex;align-items:flex-start;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
.classify-row.matched{border-color:var(--accent-border);background:var(--accent-bg)}
.field-type-label{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;min-width:78px;padding-top:4px}
.field-type-label span{display:inline-block;margin-right:3px;font-size:13px}
.classify-input{flex:1;font-family:'Noto Sans JP',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 9px;background:var(--surface);color:var(--text);resize:vertical;min-height:34px}
.classify-input:focus{outline:none;border-color:var(--accent)}
.classify-input.multi{min-height:52px}
.conf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.conf-high{background:#2d5a3d}
.conf-low{background:#ccc}

.ocr-raw-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.ocr-raw-box textarea{width:100%;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:transparent;border:none;resize:vertical;min-height:80px;line-height:1.7}
.ocr-raw-box textarea:focus{outline:none}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-head{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-bg);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:1px solid var(--accent-border)}
.card-name{font-size:15px;font-weight:700;line-height:1.3}
.card-pos{font-size:12px;color:var(--text2);margin-top:2px}
.company-pill{margin-left:auto;flex-shrink:0;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:13px}
.field:last-child{border-bottom:none}
.field-ic{width:26px;height:26px;flex-shrink:0;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-top:1px}
.field-ic svg{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:1.8}
.f-label{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:500;letter-spacing:.3px}
.f-val{color:var(--text);line-height:1.5;word-break:break-all}
.f-val.mono{font-family:'DM Mono',monospace;font-size:12px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface2);border-top:1px solid var(--border)}
.card-ts{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.list-title{font-size:15px;font-weight:700}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;font-family:'Noto Sans JP',sans-serif;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:1.8;pointer-events:none}

.notice{font-size:12px;background:var(--warn-bg);border:1px solid #e8d888;border-radius:var(--radius-sm);padding:10px 12px;color:var(--warn);line-height:1.6}
.notice strong{font-weight:700}
.error-msg{font-size:12px;background:var(--danger-bg);border:1px solid #e8c0c0;border-radius:var(--radius-sm);padding:10px 12px;color:var(--danger);line-height:1.6}
.divider{height:1px;background:var(--border)}
.export-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.7}

@media(max-width:700px){
  .main{flex-direction:column}
  .panel-left{width:100%;border-right:none;border-bottom:1px solid var(--border);position:static;max-height:none}
  .topbar-sub{display:none}
}
</style>
</head>
<body>
<div class="app-shell">

<header class="topbar">
  <div class="topbar-logo"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M6 10h5M6 14h8"/></svg></div>
  <span class="topbar-title">名刺スキャナー</span>
  <span class="topbar-sub">— 無料・ブラウザのみ</span>
  <span class="topbar-badge">完全無料 / APIキー不要</span>
</header>

<div class="main">
<aside class="panel-left">

  <!-- STEP 1 -->
  <div id="step-input">
    <div class="sec-label">① 名刺を読み込む</div>
    <div class="drop-zone" id="drop-zone">
      <div class="dz-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <p class="dz-title">ドラッグ＆ドロップ</p>
      <p class="dz-sub">JPG / PNG / WebP 対応</p>
      <div class="btn-group">
        <button onclick="document.getElementById('file-input').click()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>ファイル選択</button>
        <button onclick="startCamera()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>カメラ</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    <div id="cam-wrap" style="display:none">
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-guide"><div class="cam-frame"></div></div>
        <canvas id="canvas"></canvas>
      </div>
      <div class="btn-group" style="margin-top:8px">
        <button class="btn-primary" onclick="capturePhoto()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/></svg>撮影</button>
        <button onclick="stopCamera()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- STEP 2: トリミング -->
  <div id="step-crop" style="display:none">
    <div class="sec-label">② トリミング（範囲を選択）</div>
    <div class="cropper-section">
      <div class="crop-img-wrap"><img id="crop-img" alt="crop"></div>
      <div class="crop-toolbar">
        <button class="btn-sm" onclick="cropper.rotate(-90)"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/></svg>左回転</button>
        <button class="btn-sm" onclick="cropper.rotate(90)"><svg viewBox="0 0 24 24" style="transform:scaleX(-1)"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/></svg>右回転</button>
        <button class="btn-sm" onclick="cropper.reset()">リセット</button>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" onclick="applyCrop()"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>トリミングしてOCRへ</button>
      <button onclick="clearAll()">やり直す</button>
    </div>
  </div>

  <!-- STEP 3: OCR -->
  <div id="step-progress" style="display:none">
    <div class="sec-label">③ テキスト認識中...</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
      <div class="progress-label"><span id="prog-status">初期化中...</span><span id="prog-pct">0%</span></div>
    </div>
  </div>

  <!-- STEP 4: 分類エディタ -->
  <div id="step-classify" style="display:none">
    <div class="sec-label">④ 分類結果を確認・修正</div>
    <div class="classify-grid" id="classify-grid"></div>
    <details style="margin-top:8px">
      <summary style="font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0;user-select:none">▸ OCR 生テキストを確認・再分類</summary>
      <div class="ocr-raw-box" style="margin-top:6px">
        <textarea id="ocr-raw" rows="6"></textarea>
        <button class="btn-sm" style="margin-top:6px" onclick="reclassify()"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.52"/></svg>再分類</button>
      </div>
    </details>
    <div class="btn-group" style="margin-top:8px">
      <button class="btn-primary" onclick="saveCard()"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>保存する</button>
      <button onclick="clearAll()">やり直す</button>
    </div>
    <div class="notice" style="margin-top:8px"><strong>ヒント：</strong>各フィールドを直接編集できます。複数値は改行で区切ってください。</div>
  </div>

  <div id="step-error" style="display:none"></div>
  <div class="divider"></div>
  <div class="notice"><strong>🔒 プライバシー：</strong>すべてブラウザ内処理。外部送信なし。</div>
</aside>

<main class="panel-right">
  <div class="list-header">
    <span class="list-title">登録済み名刺</span>
    <span style="font-size:12px;color:var(--text3)" id="card-meta">0件</span>
  </div>
  <div id="export-area" style="display:none">
    <div class="export-panel">
      <div class="sec-label" style="margin-bottom:10px">出力・エクスポート</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="exportExcel()" style="background:#1d6f42;color:#fff;border-color:#1a6038;font-weight:500"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Excel (.xlsx)</button>
        <button onclick="exportCSV()" style="background:#1a4e7a;color:#fff;border-color:#174469;font-weight:500"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV (.csv)</button>
        <button onclick="printCards()"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>印刷</button>
        <button class="btn-danger" onclick="clearAllCards()" style="margin-left:auto"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>全件削除</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">Excelはフィルター・列幅調整・概要シート付きで出力</div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="名前・会社・メールで検索..." oninput="renderCards()">
    </div>
  </div>
  <div id="cards-list"></div>
</main>
</div>
</div>

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let cards = JSON.parse(localStorage.getItem('meishi_v2') || '[]');
let currentImageData = null;
let stream = null;
let cropper = null;

const $ = id => document.getElementById(id);
const show = id => $(id).style.display = 'block';
const hide = id => $(id).style.display = 'none';

// ══════════════════════════════════════════════════
// FILE / DROP
// ══════════════════════════════════════════════════
const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
$('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) loadFile(f); e.target.value = '';
});
function loadFile(file) {
  const r = new FileReader();
  r.onload = ev => initCropper(ev.target.result);
  r.readAsDataURL(file);
}

// ══════════════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════════════
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    $('video').srcObject = stream;
    hide('drop-zone'); show('cam-wrap');
  } catch(e) { showError('カメラへのアクセスが許可されていません。ファイル選択をご利用ください。'); }
}
function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  hide('cam-wrap'); show('drop-zone');
}
function capturePhoto() {
  const v = $('video'), c = $('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  stopCamera();
  initCropper(c.toDataURL('image/jpeg', 0.95));
}

// ══════════════════════════════════════════════════
// CROPPER
// ══════════════════════════════════════════════════
function initCropper(dataUrl) {
  hide('step-input');
  show('step-crop');
  const img = $('crop-img');
  // Reset src to force onload
  img.src = '';
  img.onload = () => {
    if (cropper) { cropper.destroy(); cropper = null; }
    cropper = new Cropper(img, {
      viewMode: 1,
      dragMode: 'move',
      aspectRatio: NaN,
      autoCropArea: 0.88,
      movable: true,
      zoomable: true,
      rotatable: true,
      scalable: false,
      background: false,
      guides: true,
    });
  };
  img.src = dataUrl;
}

function applyCrop() {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas({ maxWidth: 2000, maxHeight: 2000, imageSmoothingQuality: 'high' });
  currentImageData = canvas.toDataURL('image/jpeg', 0.95);
  cropper.destroy(); cropper = null;
  hide('step-crop');
  startOCR();
}

// ══════════════════════════════════════════════════
// OCR
// ══════════════════════════════════════════════════
async function startOCR() {
  show('step-progress');
  hide('step-error');
  try {
    const worker = await Tesseract.createWorker(['jpn', 'eng'], 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const p = Math.round(m.progress * 100);
          $('prog-fill').style.width = p + '%';
          $('prog-pct').textContent = p + '%';
          $('prog-status').textContent = 'テキスト認識中...';
        } else if (m.status === 'loading language traineddata') {
          $('prog-status').textContent = '言語データ読み込み中...';
        }
      }
    });
    const { data: { text } } = await worker.recognize(currentImageData);
    await worker.terminate();
    hide('step-progress');

    const cleaned = cleanText(text);
    $('ocr-raw').value = cleaned;
    const classified = classify(cleaned);
    renderEditor(classified);
    show('step-classify');
  } catch(err) {
    hide('step-progress');
    showError('OCR処理中にエラーが発生しました。もう一度お試しください。');
    show('step-input');
  }
}

// ══════════════════════════════════════════════════
// TEXT CLEANING  ← スペース除去エンジン
// ══════════════════════════════════════════════════
function cleanText(raw) {
  const JA = '[\u3000-\u9FFF\uF900-\uFAFF\uFF00-\uFFEF]'; // 漢字・かな・全角
  const KA = '[\u30A0-\u30FF]';  // カタカナ
  const HI = '[\u3040-\u309F]';  // ひらがな
  const KJ = '[\u4E00-\u9FFF]';  // 漢字

  let lines = raw.split(/\r?\n/);
  lines = lines.map(line => {
    // 1. 漢字・かな・全角文字間の半角スペース除去（OCR起因のアーティファクト）
    for (let i = 0; i < 6; i++) {
      line = line
        .replace(new RegExp('(' + JA + ') +(' + JA + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + KA + ') +(' + KA + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + HI + ') +(' + HI + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + KJ + ') +(' + HI + '|' + KA + ')', 'g'), '$1$2')
        .replace(new RegExp('(' + HI + '|' + KA + ') +(' + KJ + ')', 'g'), '$1$2');
    }

    // 2. メールアドレス内スペース除去
    line = line.replace(/([a-zA-Z0-9._%+\-])\s+@\s*/g, '$1@');
    line = line.replace(/@\s+([a-zA-Z0-9.\-])/g, '@$1');
    line = line.replace(/([a-zA-Z0-9\-])\s+\.\s+([a-zA-Z]{2,})/g, '$1.$2');

    // 3. 電話番号ハイフン前後スペース除去
    line = line.replace(/(\d)\s*[-ー]\s*(\d)/g, '$1-$2');
    line = line.replace(/(\d)\s+(\d{4})\s*[-ー]\s*(\d)/g, '$1-$2-$3');

    // 4. 郵便番号スペース除去
    line = line.replace(/〒\s*(\d{3})\s*[-ー]?\s*(\d{4})/g, '〒$1-$2');

    // 5. 株式会社等の間スペース除去
    line = line.replace(/株\s*式\s*会\s*社/g, '株式会社');
    line = line.replace(/有\s*限\s*会\s*社/g, '有限会社');
    line = line.replace(/合\s*同\s*会\s*社/g, '合同会社');

    // 6. 前後トリム
    return line.trim();
  });

  // 連続空行を1行に
  lines = lines.filter((l, i) => l !== '' || (i > 0 && lines[i-1] !== ''));
  return lines.join('\n').trim();
}

// ══════════════════════════════════════════════════
// CLASSIFICATION ENGINE  ← ルールベース分類
// ══════════════════════════════════════════════════

/*
  各フィールドの判定基準（事前学習ルール）
  ─────────────────────────────────────────
  email    : @を含み、ドメイン(.jp/.com/.net等)が続く
  phone    : 日本の電話番号パターン（0X-XXXX-XXXX形式）
  address  : 〒郵便番号 / 都道府県 / 市区町村 / 番地 / ビル等
  company  : 株式会社/有限会社/合同会社 / Inc./Ltd. / Holdings等
  title    : 役職キーワード（部長/課長/CEO/Director等）
  name     : 漢字2〜5文字 または 英字Firstname Lastname
  other    : 上記いずれにも一致しない行
*/

const RULES = {
  email: {
    // @があり有効なドメインを持つ
    strong: l => /[\w._%+\-]+@[\w.\-]+\.[a-zA-Z]{2,}/i.test(l),
    weak:   l => l.includes('@') && l.length < 60,
    extract: l => {
      const m = l.match(/[\w._%+\-]+@[\w.\-]+\.[a-zA-Z]{2,}/gi);
      return m ? m : [l];
    }
  },
  phone: {
    // 固定電話・携帯・フリーダイヤル・国際プレフィックス
    strong: l => /(?:\+81[-\s]?|0)(?:\d{1,4}[-\s]?\d{1,4}[-\s]?\d{3,4}|[789]0[-\s]?\d{4}[-\s]?\d{4}|120[-\s]?\d{3}[-\s]?\d{3})/.test(l.replace(/[（）()]/g,'')),
    weak:   l => /\d{2,4}[-\s]\d{2,4}[-\s]\d{3,4}/.test(l),
    extract: l => {
      const m = l.replace(/[（）()]/g,'').match(/(?:\+81[-\s]?)?0\d{1,4}[-\s]?\d{1,4}[-\s]?\d{3,4}/g);
      return m ? m.map(p => p.replace(/\s/g,'')) : [l];
    }
  },
  address: {
    // 郵便番号 / 都道府県 / 丁目・番地・号室 / ビル・棟
    strong: l =>
      /〒?\d{3}[-ー]\d{4}/.test(l) ||
      /[東西南北]?[都道府県]|北海道/.test(l) ||
      /[市区町村]\d|丁目|番地|番[\s　]?号|号室|ビル|タワー|棟|階/.test(l),
    weak:   l => /[市区町村]/.test(l) && l.length > 5,
    extract: l => [l.trim()]
  },
  company: {
    // 法人格 / 英語法人表記 / HD・グループ
    strong: l =>
      /株式会社|有限会社|合同会社|合資会社|一般社団法人|公益社団法人|一般財団法人|公益財団法人|医療法人|学校法人|社会福祉法人|NPO法人|協同組合/.test(l) ||
      /\b(?:Inc\.|Corp\.|Ltd\.|L\.L\.C\.|LLC|GmbH|S\.A\.|Co\.,?\s*Ltd\.?)\b/i.test(l) ||
      (/(?:グループ|ホールディングス|Holdings|Group)$/.test(l) && l.length < 50),
    weak: l => /会社|Corporation|Enterprise/.test(l) && l.length < 50,
    extract: l => [l.trim()]
  },
  title: {
    // 役職・肩書きキーワード
    strong: l => {
      const kw = [
        '代表取締役','取締役','代表社員','業務執行','監査役','会長','社長','副社長','専務','常務',
        '部長','副部長','課長','係長','主任','チーフ','リーダー','マネージャー','ディレクター',
        '担当','顧問','相談役','参与','執行役員','フェロー','エバンジェリスト',
        'CEO','CTO','COO','CFO','CMO','CIO','CSO','CPO','CDO','CBO',
        'Director','Manager','President','Vice President','VP','Senior Manager',
        'Lead','Head','Principal','Staff','Specialist','Consultant','Advisor',
        'Engineer','Designer','Developer','Architect','Analyst','Strategist',
        'Producer','Coordinator','Officer','Associate','Executive','Fellow'
      ];
      return kw.some(k => l.includes(k)) && !l.includes('@') && l.length < 60;
    },
    weak: l => /役|長$|員$|士$|師$|官$/.test(l) && l.length < 30 && !l.includes('@'),
    extract: l => [l.trim()]
  },
  name: {
    // 日本人名（漢字2〜5文字 or 姓名スペース区切り） / 英語名
    strong: l =>
      /^[\u4E00-\u9FFF\u3040-\u30FF]{1,5}[\s　]+[\u4E00-\u9FFF\u3040-\u30FF]{1,5}$/.test(l) ||
      /^[\u4E00-\u9FFF]{2,4}$/.test(l) ||
      /^[A-Z][a-z]+(?:\s[A-Z]\.?)?\s[A-Z][a-z]+$/.test(l),
    weak: l =>
      /^[\u4E00-\u9FFF\u3040-\u30FF]{2,6}$/.test(l) && l.length <= 6,
    extract: l => [l.trim()]
  }
};

function classify(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length >= 2);
  const result = { email:[], phone:[], address:[], company:'', name:'', title:'', other:[] };
  const used = new Set();

  // PASS 1 — 強ルール（確実マッチ）
  for (const [fld, rule] of Object.entries(RULES)) {
    for (let i = 0; i < lines.length; i++) {
      if (used.has(i) || !rule.strong(lines[i])) continue;
      const extracted = rule.extract(lines[i]);
      if (['email','phone'].includes(fld)) {
        result[fld].push(...extracted);
      } else if (fld === 'address') {
        result.address.push(...extracted);
      } else {
        if (!result[fld]) result[fld] = extracted[0];
      }
      used.add(i);
    }
  }

  // PASS 2 — 弱ルール（未分類のみ）
  for (const [fld, rule] of Object.entries(RULES)) {
    if (!rule.weak) continue;
    for (let i = 0; i < lines.length; i++) {
      if (used.has(i) || !rule.weak(lines[i])) continue;
      const extracted = rule.extract(lines[i]);
      if (fld === 'address') {
        result.address.push(...extracted); used.add(i);
      } else if (fld === 'email') {
        result.email.push(...extracted); used.add(i);
      } else if (fld === 'phone') {
        result.phone.push(...extracted); used.add(i);
      } else if (!result[fld]) {
        result[fld] = extracted[0]; used.add(i);
      }
    }
  }

  // PASS 3 — 残り → other
  for (let i = 0; i < lines.length; i++) {
    if (!used.has(i)) {
      const l = lines[i];
      if (l.length <= 80 && !/^[\s\-_=*#|.。、…]+$/.test(l)) result.other.push(l);
    }
  }

  // 重複除去
  ['email','phone','address','other'].forEach(k => { result[k] = [...new Set(result[k])]; });
  return result;
}

function reclassify() {
  const cleaned = cleanText($('ocr-raw').value.trim());
  $('ocr-raw').value = cleaned;
  renderEditor(classify(cleaned));
}

// ══════════════════════════════════════════════════
// EDITOR UI
// ══════════════════════════════════════════════════
const FIELDS = [
  { key:'company', label:'会社名',        icon:'🏢', multi:false },
  { key:'name',    label:'氏名',          icon:'👤', multi:false },
  { key:'title',   label:'役職',          icon:'💼', multi:false },
  { key:'phone',   label:'電話番号',      icon:'📞', multi:true  },
  { key:'email',   label:'メールアドレス', icon:'📧', multi:true  },
  { key:'address', label:'住所',          icon:'📍', multi:true  },
  { key:'other',   label:'その他',        icon:'📝', multi:true  },
];

function renderEditor(data) {
  $('classify-grid').innerHTML = FIELDS.map(f => {
    const val = Array.isArray(data[f.key]) ? data[f.key].join('\n') : (data[f.key] || '');
    const has = val.trim().length > 0;
    return `<div class="classify-row${has?' matched':''}">
      <span class="field-type-label"><span>${f.icon}</span>${f.label}</span>
      <span class="conf-dot ${has?'conf-high':'conf-low'}" title="${has?'検出':'未検出'}"></span>
      <textarea class="classify-input${f.multi?' multi':''}" id="cf_${f.key}" rows="${f.multi?3:1}" placeholder="${f.label}">${val}</textarea>
    </div>`;
  }).join('');
}

function getEditorValues() {
  const out = {};
  for (const f of FIELDS) {
    const raw = ($('cf_' + f.key)?.value || '').trim();
    out[f.key] = f.multi ? (raw ? raw.split('\n').map(l=>l.trim()).filter(Boolean) : []) : raw;
  }
  return out;
}

// ══════════════════════════════════════════════════
// SAVE / DELETE
// ══════════════════════════════════════════════════
function saveCard() {
  const vals = getEditorValues();
  cards.unshift({ id:Date.now(), ts:new Date().toLocaleString('ja-JP'), rawText:$('ocr-raw').value, ...vals });
  saveCards(); clearAll(); renderCards();
}
function saveCards() { try { localStorage.setItem('meishi_v2', JSON.stringify(cards)); } catch(e){} }
function deleteCard(id) { if (!confirm('この名刺を削除しますか？')) return; cards = cards.filter(c=>c.id!==id); saveCards(); renderCards(); }
function clearAllCards() { if (!confirm('全件削除しますか？')) return; cards=[]; saveCards(); renderCards(); }

// ══════════════════════════════════════════════════
// CLEAR
// ══════════════════════════════════════════════════
function clearAll() {
  currentImageData = null;
  if (cropper) { cropper.destroy(); cropper = null; }
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  ['step-crop','step-progress','step-classify','step-error','cam-wrap'].forEach(hide);
  show('step-input'); show('drop-zone');
  $('prog-fill').style.width='0%'; $('prog-pct').textContent='0%'; $('prog-status').textContent='初期化中...';
}
function showError(msg) { const e=$('step-error'); e.style.display='block'; e.innerHTML=`<div class="error-msg">⚠️ ${msg}</div>`; }

// ══════════════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════════════
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/[\s　]+/);
  return p.length>=2 ? p[0][0]+p[p.length-1][0] : name.slice(0,2);
}

const IC = {
  tel:  '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/>',
  mail: '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
  map:  '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  tag:  '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>',
};
function frow(ic, label, content) {
  return `<div class="field"><div class="field-ic"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:1.8">${IC[ic]}</svg></div><div style="flex:1;min-width:0"><div class="f-label">${label}</div>${content}</div></div>`;
}

function renderCards() {
  const q = ($('search')?.value||'').toLowerCase();
  const filtered = q ? cards.filter(c=>
    (c.name||'').toLowerCase().includes(q) ||
    (c.company||'').toLowerCase().includes(q) ||
    (c.email||[]).join(' ').toLowerCase().includes(q) ||
    (c.rawText||'').toLowerCase().includes(q)
  ) : cards;

  $('card-meta').textContent = cards.length + '件';
  $('export-area').style.display = cards.length > 0 ? 'block' : 'none';

  const list = $('cards-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">${cards.length===0?'名刺がまだ登録されていません':'検索結果がありません'}</div><div class="empty-sub">${cards.length===0?'左パネルから名刺を読み込んでください':''}</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const phones = (c.phone||[]).filter(Boolean);
    const emails = (c.email||[]).filter(Boolean);
    const addrs  = (c.address||[]).filter(Boolean);
    const others = (c.other||[]).filter(Boolean);
    const rows = [
      phones.length ? frow('tel','電話番号', phones.map(p=>`<div class="f-val mono">${p}</div>`).join('')) : '',
      emails.length ? frow('mail','メールアドレス', emails.map(e=>`<div class="f-val mono">${e}</div>`).join('')) : '',
      addrs.length  ? frow('map','住所', addrs.map(a=>`<div class="f-val">${a}</div>`).join('')) : '',
      others.length ? frow('tag','その他', `<div class="tag-list">${others.map(o=>`<span class="tag">${o}</span>`).join('')}</div>`) : '',
    ].filter(Boolean).join('');
    return `<div class="card">
      <div class="card-head">
        <div class="avatar">${initials(c.name)}</div>
        <div style="flex:1;min-width:0"><div class="card-name">${c.name||'（氏名不明）'}</div><div class="card-pos">${c.title||''}</div></div>
        ${c.company?`<div class="company-pill" title="${c.company}">${c.company}</div>`:''}
      </div>
      <div>${rows||`<div class="field"><span style="font-size:12px;color:var(--text3)">連絡先情報が見つかりませんでした</span></div>`}</div>
      <div class="card-foot">
        <span class="card-ts">${c.ts}</span>
        <div style="display:flex;gap:6px">
          <button class="btn-sm" onclick="showRaw(${c.id})"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>OCR原文</button>
          <button class="btn-sm btn-danger" onclick="deleteCard(${c.id})"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function showRaw(id) {
  const c = cards.find(x=>x.id===id); if (!c) return;
  const w = window.open('','_blank','width=520,height=440');
  w.document.write(`<pre style="font-family:monospace;padding:16px;white-space:pre-wrap;word-break:break-word;font-size:13px">${c.rawText||''}</pre>`);
  w.document.close();
}

// ══════════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════════
function buildRows() {
  return cards.map(c => ({
    '登録日時':         c.ts||'',
    '会社名':           c.company||'',
    '氏名':             c.name||'',
    '役職':             c.title||'',
    '電話番号1':        (c.phone||[])[0]||'',
    '電話番号2':        (c.phone||[])[1]||'',
    'メールアドレス1':  (c.email||[])[0]||'',
    'メールアドレス2':  (c.email||[])[1]||'',
    '住所':             (c.address||[]).join(' '),
    'その他':           (c.other||[]).join(' / '),
  }));
}
function exportExcel() {
  if (!cards.length) { alert('エクスポートする名刺がありません。'); return; }
  const rows = buildRows();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:26},{wch:14},{wch:20},{wch:16},{wch:16},{wch:30},{wch:30},{wch:36},{wch:28}];
  const range = XLSX.utils.decode_range(ws['!ref']);
  ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0},e:{r:0,c:range.e.c}}) };
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '名刺リスト');
  const meta = XLSX.utils.aoa_to_sheet([
    ['エクスポート日時', new Date().toLocaleString('ja-JP')],
    ['件数', cards.length+'件'],['作成ツール','名刺スキャナー（ブラウザ）'],
  ]);
  meta['!cols'] = [{wch:20},{wch:32}];
  XLSX.utils.book_append_sheet(wb, meta, '概要');
  XLSX.writeFile(wb, '名刺リスト_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.xlsx');
}
function exportCSV() {
  if (!cards.length) { alert('エクスポートする名刺がありません。'); return; }
  const rows = buildRows(), headers = Object.keys(rows[0]);
  const csv = '\uFEFF' + [headers.map(h=>`"${h}"`).join(','), ...rows.map(r=>headers.map(h=>`"${String(r[h]).replace(/"/g,'""')}"`).join(','))].join('\r\n');
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),download:'名刺リスト_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.csv'});
  a.click();
}
function printCards() {

  const rows = buildRows(), headers = Object.keys(rows[0]);
  const w = window.open('','_blank');
